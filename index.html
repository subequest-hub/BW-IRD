// ─── ROOM WING/FLOOR PARSER ───────────────────────────────────────────────────
// Beverly Wilshire room numbering: last 2 digits = room on floor, rest = floor number.
// Wilshire Wing: room suffix 01–22 (e.g. 808 → floor 8, room 08 → Wilshire)
// Beverly Wing: room suffix 60–90 (e.g. 1289 → floor 12, room 89 → Beverly)
function parseRoom(roomNumber) {
  const digits = String(roomNumber).replace(/\D/g, "");
  if (!digits) return { wing: "Other", floor: 0, room: 0, raw: roomNumber };
  let floor, room;
  if (digits.length <= 2) {
    // Just a room number with no floor prefix, e.g. "08"
    floor = 0;
    room = parseInt(digits, 10);
  } else {
    room = parseInt(digits.slice(-2), 10);
    floor = parseInt(digits.slice(0, -2), 10);
  }
  let wing = "Other";
  if (room >= 1 && room <= 22) wing = "Wilshire Wing";
  else if (room >= 60 && room <= 90) wing = "Beverly Wing";
  return { wing, floor, room, raw: roomNumber };
}

// Sort comparator: Wilshire Wing first, then Beverly Wing, then Other — each by floor then room, low to high
function sortByRoom(a, b) {
  const pa = parseRoom(a.roomNumber);
  const pb = parseRoom(b.roomNumber);
  const wingOrder = { "Wilshire Wing": 0, "Beverly Wing": 1, "Other": 2 };
  if (wingOrder[pa.wing] !== wingOrder[pb.wing]) return wingOrder[pa.wing] - wingOrder[pb.wing];
  if (pa.floor !== pb.floor) return pa.floor - pb.floor;
  return pa.room - pb.room;
}

const OTR_KEYWORDS = ["aviation","cosmopolitan","mai tai","the margarita","the old fashioned"];

function getTableSetup(items, guestCount) {
  const setup = new Set();
  const n = guestCount || 1;

  // ── GLOBAL ────────────────────────────────────────────────────────────────
  setup.add(`${n}x Ice Water`);
  setup.add("Salt & Pepper");
  setup.add("Butter on Bread Rolls");

  items.forEach(raw => {
    const item = (typeof raw === "string" ? raw : String(raw || "")).toLowerCase();

    // ── INHERITANCE: sub-components ─────────────────────────────────────────

    // Fries
    if (item.includes("fries") || item.includes("french fries")) {
      setup.add("Ketchup / Mayo / Mustard");
    }
    // Side salad
    if (item.includes("side salad") || item.includes("small mixed greens")) {
      setup.add("Dressing");
    }
    // Toast breads
    if (TOAST_BREADS.some(b => item.includes(b))) {
      setup.add("Butter & Preserves");
    }
    // Juice
    if ((item.includes("juice") || item.includes("beet detox") || item.includes("healthy greens juice")) && !item.includes("orange juice latte")) {
      setup.add("Empty Water Glass");
    }
    // Coffee / hot bev
    if (item.includes("pot of coffee") || item.includes("cappuccino") || item.includes("latte") || item.includes("chai latte") || item.includes("matcha latte")) {
      setup.add("Mug Setup (x2)"); setup.add("Cream"); setup.add("Sugar");
    }
    if (item.includes("espresso") || item.includes("macchiato") || item.includes("americano")) {
      setup.add("Sugar"); setup.add("Small Spoon");
    }
    // Tea
    if (item.includes("tea") && !item.includes("iced tea")) {
      setup.add("Mug Setup"); setup.add("Tea Bags"); setup.add("Sugar"); setup.add("Honey"); setup.add("Hot Water");
    }
    if (item.includes("iced tea")) {
      setup.add("Glass of Ice"); setup.add("Straw");
    }
    // Fruit / berries
    if (item.includes("berries") || item.includes("fruit bowl") || item.includes("fruit plate") || item.includes("small fruit")) {
      setup.add("Small Fork");
    }

    // ── SPECIFIC ITEMS ───────────────────────────────────────────────────────

    // Breakfast Collections (composite)
    if (item.includes("pretty woman egg white omelet") || item.includes("california dreaming")) {
      setup.add("Empty Water Glass"); setup.add("Mug Setup (x2)"); setup.add("Cream"); setup.add("Sugar"); setup.add("Ketchup");
    }
    if (item.includes("beverly continental")) {
      setup.add("Butter & Preserves");
    }

    // Eggs
    if (item.includes("three egg omelet") || item.includes("two eggs any style") || item.includes("santa monica") || item.includes("benedict")) {
      setup.add("Ketchup");
    }
    if (item.includes("breakfast burrito")) {
      setup.add("Veggie Sauce");
    }

    // Griddle
    if (item.includes("french toast")) {
      setup.add("Maple Syrup"); setup.add("Seasonal Berries");
    }
    if (item.includes("rodeo pancakes") || item.includes("mini pancakes") || item.includes("french toast sticks")) {
      setup.add("Vermont Maple Syrup"); setup.add("Seasonal Berries");
    }
    if (item.includes("belgian waffle")) {
      setup.add("Vanilla Whipped Cream"); setup.add("Strawberry Compote"); setup.add("Vermont Maple Syrup");
    }

    // Bagel
    if (item.includes("bagel")) {
      setup.add("Cream Cheese"); setup.add("Butter & Preserves");
    }

    // Salads + enhancements
    if (item.includes("caesar salad") || item.includes("superfood salad") || item.includes("greek salad") || item.includes("wilshire wedge") || item.includes("lobster cobb") || item.includes("fattoush") || item.includes("green salad") || item.includes("kid\'s caesar")) {
      setup.add("Dressing"); setup.add("Bread Rolls");
    }
    if (item.includes("add chicken") || item.includes("add steak") || item.includes("add shrimp") || item.includes("add salmon") || item.includes("grilled jidori") || item.includes("prime skirt") || item.includes("ora king") || item.includes("grilled shrimp")) {
      setup.add("Dressing"); setup.add("Bread Rolls");
    }

    // Pasta
    if (item.includes("spaghetti") || item.includes("cacio e pepe") || item.includes("lasagna") || item.includes("four cheese") || item.includes("vegan spaghetti") || item.includes("kids spaghetti")) {
      setup.add("Parmesan Cheese"); setup.add("Chili Flakes"); setup.add("Bread Rolls");
    }
    if (item.includes("pad thai")) {
      setup.add("Parmesan Cheese"); setup.add("Chili Flakes"); setup.add("Bread Rolls");
    }
    if (item.includes("seafood risotto")) {
      setup.add("Bread Rolls");
    }
    if (item.includes("kids mac") || item.includes("mac & cheese")) {
      setup.add("Parmesan Cheese");
    }

    // Pizza
    if (item.includes("pizza")) {
      setup.add("Parmesan Cheese"); setup.add("Chili Flakes");
    }

    // Burgers / sandwiches / hot dog / quesadilla
    if (item.includes("smash burger") || item.includes("cheeseburger") || item.includes("avocado club") || item.includes("hot dog") || item.includes("quesadilla")) {
      setup.add("Ketchup / Mayo / Mustard");
    }
    if (item.includes("chicken fingers")) {
      setup.add("Ketchup / Mayo / Mustard"); setup.add("BBQ Sauce");
    }

    // Fried rice
    if (item.includes("fried rice")) {
      setup.add("Chili Crunch"); setup.add("House Soy Sauce");
    }

    // Butter chicken
    if (item.includes("butter chicken")) {
      setup.add("Aromatic Rice"); setup.add("Bread Rolls");
    }

    // Dynamite shrimp / other world items
    if (item.includes("dynamite shrimp") || item.includes("potstickers") || item.includes("hummus")) {
      setup.add("Bread Rolls");
    }

    // From the Grill
    if (item.includes("beef tenderloin") || item.includes("new york strip")) {
      setup.add("Steak Knife"); setup.add("Bread Rolls");
    }
    if (item.includes("sea bass") || (item.includes("salmon") && !item.includes("smoked salmon")) || item.includes("branzino") || item.includes("roasted chicken") || item.includes("maple-glazed")) {
      setup.add("Bread Rolls");
    }

    // Soups
    if (item.includes("soup") || item.includes("chicken noodle")) {
      setup.add("Bread Rolls"); setup.add("Spoon");
    }

    // Desserts
    if (item.includes("chocolate cake") || item.includes("cheesecake") || item.includes("panna cotta")) {
      setup.add("Dessert Fork");
    }
    if (item.includes("bread pudding") || item.includes("ice cream")) {
      setup.add("Spoon");
    }

    // Movie Night
    if (item.includes("pretzel bites")) {
      setup.add("Honey Mustard"); setup.add("Smoky Aioli");
    }
    if (item.includes("movie night combo")) {
      setup.add("Honey Mustard"); setup.add("Smoky Aioli");
    }

    // Beverages
    if (item.includes("soda") || BEER_KEYWORDS.some(b => item.includes(b)) === false && (item.includes("red bull") || item.includes("ginger ale") || item.includes("club soda") || item.includes("sprite") || item.includes("coke"))) {
      setup.add("Glass of Ice"); setup.add("Straw");
    }
    if (item.includes("lemonade")) {
      setup.add("Glass of Ice"); setup.add("Straw");
    }
    if (item.includes("fresh juice") && !item.includes("orange juice latte")) {
      setup.add("Empty Water Glass");
    }

    // Alcohol — wine bottle / bubbles → ice bucket
    if (BUBBLE_KEYWORDS.some(b => item.includes(b)) || (WINE_KEYWORDS.some(w => item.includes(w)) && (item.includes("bottle") || item.includes("(bottle)")))) {
      setup.add(`Ice Bucket`);
      setup.add(`${n}x Wine Glass`);
    }
    // Beer
    if (BEER_KEYWORDS.some(b => item.includes(b))) {
      setup.add("Ice Bucket"); setup.add("Empty Water Glass");
    }
    // Spirits
    if (SPIRIT_KEYWORDS.some(s => item.includes(s))) {
      setup.add("Request from BLVD Bar — Bring Empty Glass");
    }
    // OTR cocktails
    if (OTR_KEYWORDS.some(o => item.includes(o)) || item.includes("otr")) {
      setup.add("Glass of Ice");
    }

    // Kids
    if (item.includes("little angeleno")) {
      setup.add("Maple Syrup"); setup.add("Small Cup of Berries"); setup.add("Straw");
    }

    // Pet
    if (item.includes("chicken & white rice (pet)") || item.includes("beef & potato (pet)") || item.includes("mac & tuna") || item.includes("bone appetit") || item.includes("peanut butter cookies (pet)") || item.includes("san benedetto")) {
      setup.add("Dog Bowl");
    }

    // ── OPEN / CUSTOM ITEMS ──────────────────────────────────────────────────
    // "Open Food", "Open Beverage", "Open Bar", "Open Dessert" etc.
    // Look at the description after the dash to infer setup
    if (item.startsWith("open ")) {
      // Extract description after dash
      const desc = item.includes("—") ? item.split("—")[1].trim() : item.replace(/^open\s+\w+\s*/i, "");

      // Beverage hints
      if (desc.includes("juice") || desc.includes("watermelon") || desc.includes("lemonade")) {
        setup.add("Empty Water Glass");
      }
      if (desc.includes("coffee") || desc.includes("cappuccino") || desc.includes("latte")) {
        setup.add("Mug Setup (x2)"); setup.add("Cream"); setup.add("Sugar");
      }
      if (desc.includes("tea")) {
        setup.add("Mug Setup"); setup.add("Tea Bags"); setup.add("Sugar"); setup.add("Honey"); setup.add("Hot Water");
      }
      if (desc.includes("soda") || desc.includes("coke") || desc.includes("sprite") || desc.includes("red bull") || desc.includes("iced") || desc.includes("cold")) {
        setup.add("Glass of Ice"); setup.add("Straw");
      }
      if (desc.includes("wine") || desc.includes("champagne") || desc.includes("prosecco")) {
        setup.add("Ice Bucket"); setup.add(`${n}x Wine Glass`);
      }
      if (desc.includes("beer")) {
        setup.add("Ice Bucket"); setup.add("Empty Water Glass");
      }
      if (SPIRIT_KEYWORDS.some(s => desc.includes(s))) {
        setup.add("Request from BLVD Bar — Bring Empty Glass");
      }

      // Food hints
      if (desc.includes("ice cream") || desc.includes("sorbet")) {
        setup.add("Spoon");
      }
      if (desc.includes("cake") || desc.includes("tart") || desc.includes("pie") || desc.includes("cheesecake")) {
        setup.add("Dessert Fork");
      }
      if (desc.includes("soup")) {
        setup.add("Bread Rolls"); setup.add("Spoon");
      }
      if (desc.includes("pasta") || desc.includes("spaghetti") || desc.includes("penne") || desc.includes("fettuccine") || desc.includes("linguine")) {
        setup.add("Parmesan Cheese"); setup.add("Chili Flakes"); setup.add("Bread Rolls");
      }
      if (desc.includes("salad")) {
        setup.add("Dressing"); setup.add("Bread Rolls");
      }
      if (desc.includes("burger") || desc.includes("sandwich") || desc.includes("hot dog")) {
        setup.add("Ketchup / Mayo / Mustard");
      }
      if (desc.includes("fries") || desc.includes("chips")) {
        setup.add("Ketchup / Mayo / Mustard");
      }
      if (desc.includes("steak") || desc.includes("tenderloin") || desc.includes("strip")) {
        setup.add("Steak Knife"); setup.add("Bread Rolls");
      }
      if (desc.includes("berry") || desc.includes("berries") || desc.includes("fruit")) {
        setup.add("Small Fork");
      }
      if (desc.includes("waffle") || desc.includes("pancake") || desc.includes("french toast")) {
        setup.add("Vermont Maple Syrup"); setup.add("Seasonal Berries");
      }
      // If we can't figure it out, at least flag it
      if (setup.size === 3) { // only has the global 3 items
        setup.add("⚠️ Custom item — verify table setup manually");
      }
    }
  });

  return [...setup].sort();
}

function DietTag({ tag }) {

}
function Checklist({ items, checked, onToggle }) {

        flexShrink: 0, width: 20, height: 20, borderRadius: 6,

// ─── OPTIONS MODAL ────────────────────────────────────────────────────────────
function OptionsModal({ menuItem, onConfirm, onClose }) {
  const [sel, setSel] = useState({});
  const [qty, setQty] = useState(1);
  const [prep, setPrep] = useState("");
  const opts = menuItem.options || [];
  const ready = opts.length === 0 || opts.every(o => sel[o.label]);
  const buildLabel = () => {
    const parts = opts.map(o => sel[o.label]).filter(Boolean);
    return `${qty > 1 ? qty+"x " : ""}${menuItem.name}${parts.length ? ` (${parts.join(", ")})` : ""}${prep.trim() ? ` — ${prep.trim()}` : ""}`;
  };
  return (
    <div style={{ position: "fixed", inset: 0, background: "#000b", zIndex: 200, display: "flex", alignItems: "flex-end" }}>
      <div style={{ background: "#141D2E", borderRadius: "16px 16px 0 0", width: "100%", maxWidth: 480, margin: "0 auto", padding: 20, maxHeight: "88vh", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 17 }}>{menuItem.name}</div>
            <div style={{ fontSize: 13, color: "#C9A24B", fontWeight: 600 }}>${menuItem.price}</div>
            {menuItem.note && <div style={{ fontSize: 12, color: "#52617A", marginTop: 2 }}>{menuItem.note}</div>}
            <div style={{ display: "flex", gap: 4, marginTop: 4, flexWrap: "wrap" }}>{(menuItem.tags||[]).map(t => <DietTag key={t} tag={t} />)}</div>
          </div>
          <button style={{ background: "none", border: "none", color: "#7C8BA3", fontSize: 22, cursor: "pointer", alignSelf: "flex-start" }} onClick={onClose}>✕</button>
        </div>
        <label style={S.lbl}>Quantity</label>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
          <button style={{ ...S.btn("sec"), padding: "6px 18px", fontSize: 20 }} onClick={() => setQty(q => Math.max(1,q-1))}>−</button>
          <span style={{ fontSize: 22, fontWeight: 700, minWidth: 24, textAlign: "center" }}>{qty}</span>
          <button style={{ ...S.btn("sec"), padding: "6px 18px", fontSize: 20 }} onClick={() => setQty(q => q+1)}>+</button>
        </div>
        {opts.map(opt => (
          <div key={opt.label} style={{ marginBottom: 12 }}>
            <label style={S.lbl}>{opt.label}</label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {opt.choices.map(c => (
                <button key={c} onClick={() => setSel(s => ({ ...s, [opt.label]: c }))}
                  style={{ padding: "6px 12px", borderRadius: 8, border: `1px solid ${sel[opt.label]===c?"#C9A24B":"#23304A"}`, background: sel[opt.label]===c?"#C9A24B22":"#0B1220", color: sel[opt.label]===c?"#C9A24B":"#E8E4DA", cursor: "pointer", fontSize: 13 }}>
                  {c}
                </button>
              ))}
            </div>
          </div>
        ))}
        <label style={S.lbl}>Special Prep Note</label>
        <input style={{ ...S.inp, marginBottom: 16 }} placeholder="e.g. Warmed, extra sauce, no onion…" value={prep} onChange={e => setPrep(e.target.value)} />
        <button style={S.btnB(ready?"ok":"sec")} onClick={() => ready && onConfirm(buildLabel(), qty)} disabled={!ready}>
          {ready ? "Add to Order" : "Select all options"}
        </button>
      </div>
    </div>
  );
}

                  <div style={{ display: "flex", gap: 4, marginTop: 2, flexWrap: "wrap" }}>{(item.tags||[]).map(t => <DietTag key={t} tag={t} />)}</div>

                <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                  <span style={{ fontSize: 13, color: "#C9A24B", fontWeight: 600 }}>${item.price}</span>
                  <span style={{ fontSize: 20, color: "#4F9C7E", fontWeight: 700, lineHeight: 1 }}>+</span>
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>

  return (

function PhotoScanner({ onExtracted, onSkip, scanPrompt, scanTitle, scanSubtitle }) {
  const [status, setStatus] = useState("idle");
  const [preview, setPreview] = useState(null);
  const [logs, setLogs] = useState([]);

  const log = (msg) => setLogs(l => [...l, `${new Date().toLocaleTimeString()}: ${msg}`]);

  const PROMPT = scanPrompt || "You are reading a Beverly Hills hotel In-Room Dining (IRD) ticket. Extract the fields below and respond ONLY with valid JSON — no markdown, no explanation, no extra text.\n\nTICKET FORMAT RULES:\n- Guest last name: handwritten at TOP above BEV In Room Dining. May be absent.\n- Order taker: on the employee number line e.g. '10398493 Kailah' → 'Kailah'.\n- Room number: TBL field digits before slash. 'TBL 820/1' → '820'.\n- Guest count: GST field. 'GST 2' → '2'.\n- Delivery time: in Delivery Charge or FULL SERVICE SPECIAL PREP block. '855 PM'→'20:55', '6 PM'→'18:00', 'DELIVER BY 1035PM'→'22:35'. HH:MM 24h or empty.\n- Order time: bottom timestamp. '6/16/2026 7:23 PM'→'19:23'. HH:MM 24h or empty.\n- Items: every food/beverage. Leading digit is quantity, prefix >1 as Nx. Indented lines are modifiers — attach with —. Skip: Delivery Charge, FULL SERVICE, Wine Glass lines, splenda. Enhancement content appends to item above.\n- specialNotes: delivery instructions, allergies, handwritten notes, table setup from Delivery Charge block, comp notes.\n\nReturn ONLY this JSON:\n{\"guestName\":\"\",\"orderTaker\":\"\",\"roomNumber\":\"\",\"guestCount\":\"\",\"deliveryTime\":\"\",\"orderTime\":\"\",\"items\":[],\"specialNotes\":\"\"}";

  const handleFile = async (file) => {
    log(`handleFile called: ${file ? file.name + " " + file.size + "b" : "null"}`);
    if (!file) return;

    // Show preview
    const pr = new FileReader();
    pr.onload = (e) => setPreview(e.target.result);
    pr.readAsDataURL(file);
    setStatus("loading");
    log("Resizing...");

    // Resize via ObjectURL (doesn't block main thread unlike dataUrl)
    const getBase64 = () => new Promise((resolve) => {
      const fallback = () => {
        const fr = new FileReader();
        fr.onload = (e) => resolve(e.target.result.split(",")[1]);
        fr.readAsDataURL(file);
      };
      try {
        const objUrl = URL.createObjectURL(file);
        const timer = setTimeout(() => {
          log("Resize timeout — using original");
          URL.revokeObjectURL(objUrl);
          fallback();
        }, 8000);
        const img = new Image();
        img.onload = () => {
          clearTimeout(timer);
          URL.revokeObjectURL(objUrl);
          try {
            const MAX = 800;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
              if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
              else { w = Math.round(w * MAX / h); h = MAX; }
            }
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext("2d");
            if (!ctx) { fallback(); return; }
            ctx.drawImage(img, 0, 0, w, h);
            const b64 = canvas.toDataURL("image/jpeg", 0.7).split(",")[1];
            log(`Resized to ${w}x${h}, length: ${b64.length}`);
            resolve(b64);
          } catch (e2) { log("Canvas err: " + e2.message); fallback(); }
        };
        img.onerror = () => { clearTimeout(timer); URL.revokeObjectURL(objUrl); log("Img load failed"); fallback(); };
        img.src = objUrl;
      } catch (e1) { log("ObjectURL err: " + e1.message); fallback(); }
    });

    try {
      const base64 = await getBase64();
      log(`Calling API, base64 length: ${base64.length}`);
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": ANTHROPIC_API_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 2048,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
            { type: "text", text: PROMPT }
          ]}]
        })
      });
      log(`API status: ${resp.status}`);
      const data = await resp.json();
      if (!data.content) throw new Error(data.error?.message || "No content in response");
      const text = data.content.map(b => b.text || "").join("");
      const s = text.indexOf("{"), e = text.lastIndexOf("}");
      if (s === -1 || e === -1) throw new Error("No JSON in response");
      onExtracted(JSON.parse(text.slice(s, e + 1)));
      setStatus("done");
    } catch (err) {
      log(`ERROR: ${err.message}`);
      setStatus("error");
    }
  };

  // Debug log panel
  const LogPanel = () => logs.length > 0 ? (
    <div style={{ background: "#050D1A", border: "1px solid #23304A", borderRadius: 8, padding: 10, marginTop: 12, maxHeight: 160, overflowY: "auto" }}>
      <div style={{ fontSize: 10, color: "#C9A24B", fontWeight: 700, marginBottom: 4, textTransform: "uppercase" }}>🐛 Debug Log</div>
      {logs.map((l, i) => <div key={i} style={{ fontSize: 11, color: "#7C8BA3", fontFamily: "monospace", padding: "1px 0", borderBottom: "1px solid #23304A22" }}>{l}</div>)}
    </div>
  ) : null;

  // File picker: input overlays the button at full size with opacity 0
  const filePickerBtn = (variant, label, inputProps) => (
    <div style={{ position: "relative", marginTop: 8 }}
      onClick={() => log(`Div wrapper tapped — label: ${label}`)}>
      <span style={{ ...S.btnB(variant), display: "block", textAlign: "center", boxSizing: "border-box" }}>{label}</span>
      <input {...inputProps} type="file" accept="image/*"
        style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", opacity: 0, cursor: "pointer", margin: 0, padding: 0, fontSize: 0, zIndex: 10 }}
        onClick={() => log(`Input clicked — label: ${label}`)}
        onChange={e => {
          log(`onChange fired — files: ${e.target.files?.length}`);
          if (e.target.files && e.target.files[0]) handleFile(e.target.files[0]);
        }} />
    </div>
  );

  return <div>
    <h2 style={{ margin: "0 0 8px", fontSize: 21, fontWeight: 700, letterSpacing: "-0.01em" }}>{scanTitle || "📷 Scan Order Ticket"}</h2>
    <p style={{ fontSize: 13, color: "#7C8BA3", marginBottom: 16 }}>{scanSubtitle || "Take a photo of the ticket — AI will fill in the order automatically."}</p>

    {status === "idle" && <>
      {filePickerBtn("pri", "📷 Take Photo", { capture: "environment" })}
      {filePickerBtn("sec", "🖼 Choose from Library", {})}
      <button style={S.btnB("ghost")} onClick={() => { log("Skip tapped"); onSkip(); }}>Skip — Enter Manually</button>
      <LogPanel />
    </>}

    {status === "loading" && <div style={{ textAlign: "center", padding: "30px 0" }}>
      {preview && <img src={preview} alt="ticket" style={{ width: "100%", borderRadius: 10, marginBottom: 16, opacity: 0.6 }} />}
      <div style={{ fontSize: 32, marginBottom: 8 }}>🔍</div>
      <div style={{ color: "#C9A24B", fontWeight: 600 }}>Reading…</div>
      <div style={{ fontSize: 12, color: "#52617A", marginTop: 4 }}>AI is extracting details</div>
      <LogPanel />
    </div>}

    {status === "error" && <div style={{ textAlign: "center", padding: "20px 0" }}>
      <div style={{ fontSize: 32, marginBottom: 8 }}>⚠️</div>
      <div style={{ color: "#B8473A", fontWeight: 600, marginBottom: 4 }}>Couldn't read it</div>
      <div style={{ fontSize: 12, color: "#7C8BA3", marginBottom: 12 }}>Try better lighting or a closer shot.</div>
      {filePickerBtn("pri", "📷 Try Again — Camera", { capture: "environment" })}
      {filePickerBtn("sec", "🖼 Try Again — Library", {})}
      <button style={S.btnB("ghost")} onClick={onSkip}>Enter Manually</button>
      <LogPanel />
    </div>}
  </div>;
}

// ─── NEW ORDER FLOW ───────────────────────────────────────────────────────────
const STEPS = ["Photo","Details","Items","Checklist","Delivery","Done"];

function NewOrder({ onSave, onCancel }) {
  const [step, setStep] = useState(0);
  const [roomNumber, setRoomNumber] = useState("");
  const [guestName, setGuestName] = useState("");
  const [orderTaker, setOrderTaker] = useState("");
  const [guestCount, setGuestCount] = useState("");
  const [dueTime, setDueTime] = useState("");
  const [orderTime, setOrderTime] = useState(timeNow());
  const [items, setItems] = useState([]);
  const [checked, setChecked] = useState([]);
  const [fireOn, setFireOn] = useState(false);
  const [interactions, setInteractions] = useState([]);
  const [specialNotes, setSpecialNotes] = useState("");
  const [manualItem, setManualItem] = useState("");

  const applyExtracted = (p) => {
    if (p.guestName) setGuestName(p.guestName);
    if (p.orderTaker) setOrderTaker(p.orderTaker);
    if (p.roomNumber) setRoomNumber(p.roomNumber);
    if (p.guestCount) setGuestCount(String(p.guestCount));
    if (p.deliveryTime) setDueTime(p.deliveryTime);
    if (p.orderTime) setOrderTime(p.orderTime);
    if (p.specialNotes) setSpecialNotes(p.specialNotes);
    if (p.items?.length > 0) {
      const safeItems = p.items.map(it => {
        if (typeof it === "string") return it;
        if (it && typeof it === "object") return it.name || it.item || it.label || JSON.stringify(it);
        return String(it);
      });
      setItems(safeItems); setChecked(safeItems.map(()=>false));
    }
    setStep(1);
  };

  const addItem = (label) => { setItems(p=>[...p,label]); setChecked(p=>[...p,false]); };
  const removeItem = (i) => { setItems(p=>p.filter((_,j)=>j!==i)); setChecked(p=>p.filter((_,j)=>j!==i)); };
  const toggleCheck = (i) => setChecked(p=>p.map((v,j)=>j===i?!v:v));
  const addInteraction = (note) => setInteractions(p=>[...p,{note,time:timeNow()}]);
  const allChecked = items.length > 0 && checked.every(Boolean);

  const finish = () => onSave({ id: uid(), roomNumber, guestName, orderTaker, guestCount, dueTime, orderTime, items, delivered: true, interactions, specialNotes, createdAt: new Date().toISOString(), deliveredAt: new Date().toISOString() });

  const AllergyBanner = () => specialNotes ? <div style={S.cardWarn}><div style={{ fontSize: 11, color: "#C9A24B", fontWeight: 700 }}>⚠️ SPECIAL PREP / ALLERGY</div><div style={{ fontSize: 13 }}>{specialNotes}</div></div> : null;

  return <div style={S.sec}>
    <div style={{ display: "flex", gap: 5, marginBottom: 14 }}>
      {STEPS.map((s,i) => <div key={s} style={{ flex: 1, height: 4, borderRadius: 3, background: i<=step?T.brass:T.line, transition:"background 0.2s" }} />)}
    </div>
    <div style={{ fontSize: 10.5, color: T.brass, marginBottom: 16, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700 }}>
      Step {step+1}/{STEPS.length} — {STEPS[step]}
    </div>

    {step===0 && <PhotoScanner onExtracted={applyExtracted} onSkip={()=>setStep(1)} />}

    {step===1 && <div>
      <h2 style={{ margin:"0 0 14px", fontSize:21, fontWeight:700, letterSpacing:"-0.01em" }}>🛎 Order Details</h2>
      <div style={{ display:"flex", gap:8, marginBottom:10 }}>
        <div style={{ flex:1 }}>
          <label style={S.lbl}>Room Number *</label>
          <input style={{ ...S.inp, fontSize:22, fontWeight:700 }} placeholder="619" value={roomNumber} onChange={e=>setRoomNumber(e.target.value)} inputMode="numeric" />
        </div>
        <div style={{ width:70 }}>
          <label style={S.lbl}>Guests</label>
          <input style={{ ...S.inp, fontSize:18, textAlign:"center" }} placeholder="2" value={guestCount} onChange={e=>setGuestCount(e.target.value)} inputMode="numeric" />
        </div>
      </div>
      <label style={S.lbl}>Guest Last Name</label>
      <input style={{ ...S.inp, marginBottom:10 }} placeholder="e.g. Aileen" value={guestName} onChange={e=>setGuestName(e.target.value)} />
      <label style={S.lbl}>Order Taken By</label>
      <input style={{ ...S.inp, marginBottom:10 }} placeholder="e.g. Kailah" value={orderTaker} onChange={e=>setOrderTaker(e.target.value)} />
      <div style={{ display:"flex", gap:8, marginBottom:10 }}>
        <div style={{ flex:1 }}><label style={S.lbl}>Order Time</label><input style={S.inp} type="time" value={orderTime} onChange={e=>setOrderTime(e.target.value)} /></div>
        <div style={{ flex:1 }}><label style={S.lbl}>Deliver By</label><input style={S.inp} type="time" value={dueTime} onChange={e=>setDueTime(e.target.value)} /></div>
      </div>
      <label style={S.lbl}>Special Notes / Allergies</label>
      <input style={{ ...S.inp, marginBottom:8 }} placeholder="e.g. Peanuts/Almonds allergy" value={specialNotes} onChange={e=>setSpecialNotes(e.target.value)} />
      <AllergyBanner />
      <button style={S.btnB()} onClick={()=>roomNumber.trim()&&setStep(2)} disabled={!roomNumber.trim()}>Next: Add Items →</button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(0)}>← Retake Photo</button>
      <button style={S.btnB("ghost")} onClick={onCancel}>Cancel</button>
    </div>}

    {step===2 && <div>
      <h2 style={{ margin:"0 0 4px", fontSize:21, fontWeight:700, letterSpacing:"-0.01em" }}>🍽 Order Items</h2>
      <p style={{ color:"#7C8BA3", fontSize:13, marginBottom:10 }}>Tap any item to add it to the order.</p>
      <AllergyBanner />
      {items.length > 0 && <div style={{ ...S.card, marginBottom:10 }}>
        <div style={{ fontSize:11, color:"#7C8BA3", fontWeight:700, marginBottom:6 }}>ORDER ({items.length} item{items.length>1?"s":""})</div>
        {items.map((item,i) => <div key={i} style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid #23304A44", gap:8 }}>
          <span style={{ fontSize:13, flex:1 }}>• {typeof item === "string" ? item : JSON.stringify(item)}</span>
          <button style={{ background:"none", border:"none", color:"#B8473A", cursor:"pointer", fontSize:15, flexShrink:0 }} onClick={()=>removeItem(i)}>✕</button>
        </div>)}
      </div>}
      <MenuPicker onAdd={addItem} />
      <div style={S.div} />
      <label style={S.lbl}>Or type manually</label>
      <div style={{ display:"flex", gap:8 }}>
        <input style={{ ...S.inp, flex:1, fontSize:13 }} placeholder="Custom item…" value={manualItem} onChange={e=>setManualItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&manualItem.trim()&&(addItem(manualItem.trim()),setManualItem(""))} />
        <button style={S.btn("sec")} onClick={()=>{ if(manualItem.trim()){ addItem(manualItem.trim()); setManualItem(""); }}}>Add</button>
      </div>
      <button style={S.btnB()} onClick={()=>items.length>0&&setStep(3)} disabled={items.length===0}>Next: Checklist →</button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(1)}>← Back</button>
    </div>}

    {step===3 && <div>
      <h2 style={{ margin:"0 0 4px", fontSize:21, fontWeight:700, letterSpacing:"-0.01em" }}>Table Checklist</h2>
      <p style={{ color:T.slate, fontSize:13, marginBottom:14 }}>Confirm everything is on the table before you leave.</p>
      <AllergyBanner />
      <div style={{ fontSize:10.5, color:T.slate, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", margin:"10px 0 6px" }}>Order Items</div>
      <Checklist items={items} checked={checked} onToggle={toggleCheck} />
      <TableSetupChecklist items={items} guestCount={parseInt(guestCount)||1} />
      {!allChecked && <div style={{ color:T.brass, fontSize:12.5, marginTop:10, display:"flex", alignItems:"center", gap:6 }}><span>○</span>Check off all items before proceeding</div>}
      <div style={S.div} />
      <div style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        background: fireOn ? T.lacquerBg : T.panel2,
        border: `1px solid ${fireOn ? "#5A2620" : T.line}`,
        borderRadius:14, padding:"14px 16px", marginBottom:10,
        transition:"all 0.2s",
      }}>
        <div>
          <div style={{ fontWeight:700, fontSize:15, color: fireOn ? "#E89E8E" : T.cream }}>Fire Status</div>
          <div style={{ fontSize:12, color: fireOn ? "#C97A6A" : T.slate, marginTop:1 }}>Must be OFF before delivery</div>
        </div>
        <div style={{ textAlign:"center", cursor:"pointer" }} onClick={()=>setFireOn(f=>!f)}>
          <span style={S.fire(fireOn)}>🔥</span>
          <div style={{ fontSize:10.5, fontWeight:800, letterSpacing:"0.06em", color:fireOn?T.lacquer:T.jade, marginTop:2 }}>{fireOn?"ON":"OFF"}</div>
        </div>
      </div>
      {fireOn && <div style={{ color:"#E89E8E", fontSize:12.5, background:T.lacquerBg, border:"1px solid #5A2620", borderRadius:11, padding:"10px 14px", marginBottom:10, fontWeight:600 }}>Turn off the fire before ringing the guest</div>}
      <button style={S.btnB(allChecked&&!fireOn?"ok":"sec")} onClick={()=>allChecked&&!fireOn&&setStep(4)} disabled={!allChecked||fireOn}>
        {!allChecked?"Check all items first":fireOn?"Turn off fire first":"Proceed to Delivery →"}
      </button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(2)}>← Back</button>
    </div>}

    {step===4 && <div>
      <h2 style={{ margin:"0 0 4px", fontSize:21, fontWeight:700, letterSpacing:"-0.01em" }}>🚪 At the Door</h2>
      <p style={{ color:"#7C8BA3", fontSize:13, marginBottom:12 }}>Re-check landing order. Log any guest interactions.</p>
      <div style={S.card}>
        <div style={{ fontWeight:700, marginBottom:4 }}>Room {roomNumber}{guestName?` · ${guestName}`:""}  {guestCount?`· ${guestCount} guests`:""}</div>
        {orderTaker && <div style={{ fontSize:12, color:"#7C8BA3", marginBottom:6 }}>Order by: {orderTaker}</div>}
        {specialNotes && <div style={{ fontSize:12, color:"#C9A24B", marginBottom:8 }}>⚠️ {specialNotes}</div>}
        {items.map((item,i) => <div key={i} style={{ fontSize:13, padding:"2px 0" }}>✅ {typeof item === "string" ? item : JSON.stringify(item)}</div>)}
      </div>
      <label style={{ ...S.lbl, marginTop:8 }}>Guest Interactions</label>
      <InteractionLog interactions={interactions} onAdd={addInteraction} />
      <button style={S.btnB("ok")} onClick={()=>setStep(5)}>Mark as Delivered ✓</button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(3)}>← Back</button>
    </div>}

    {step===5 && <div style={{ textAlign:"center", padding:"24px 0" }}>
      <div style={{ fontSize:56, marginBottom:10 }}>✅</div>
      <h2 style={{ margin:"0 0 6px", fontSize:22, fontWeight:700, letterSpacing:"-0.01em" }}>Order Delivered!</h2>
      <div style={{ color:"#7C8BA3", marginBottom:4 }}>Room {roomNumber} · {timeNow()}</div>
      {dueTime && <div style={{ color:"#4F9C7E", fontSize:13 }}>Promised by {dueTime}</div>}
      <div style={{ ...S.card, textAlign:"left", marginTop:16 }}>
        {guestName && <div style={{ fontSize:12, color:"#7C8BA3" }}>Guest: {guestName}</div>}
        {orderTaker && <div style={{ fontSize:12, color:"#7C8BA3", marginBottom:6 }}>Taken by: {orderTaker}</div>}
        {items.map((item,i) => <div key={i} style={{ fontSize:13, padding:"2px 0" }}>• {typeof item === "string" ? item : JSON.stringify(item)}</div>)}
        {specialNotes && <div style={{ fontSize:12, color:"#C9A24B", marginTop:6 }}>⚠️ {specialNotes}</div>}
      </div>
      <button style={S.btnB("ok")} onClick={finish}>Save & Finish</button>
    </div>}
  </div>;
}

// ─── ACTIVE ORDER CARD ────────────────────────────────────────────────────────
function ActiveOrderCard({ order, onUpdate }) {
  const [expanded, setExpanded] = useState(false);
  const [interactions, setInteractions] = useState(order.interactions || []);
  const addInteraction = (note) => { const u=[...interactions,{note,time:timeNow()}]; setInteractions(u); onUpdate({...order,interactions:u}); };
  const isLate = order.dueTime && !order.delivered && (() => {
    const [h,m] = order.dueTime.split(":").map(Number);
    const due = new Date(); due.setHours(h,m,0,0);
    return new Date() > due;
  })();
  return (
    <div style={isLate ? S.cardHot : S.card}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", cursor:"pointer" }} onClick={()=>setExpanded(e=>!e)}>
        <div>
          <div style={{ fontWeight:700, fontSize:18 }}>Room {order.roomNumber}{order.guestName?` · ${order.guestName}`:""}</div>
          {order.orderTaker && <div style={{ fontSize:11, color:"#52617A" }}>by {order.orderTaker}</div>}
          <div style={{ fontSize:12, color:"#7C8BA3", marginTop:2 }}>{order.items.length} items{order.dueTime?` · Due ${order.dueTime}`:""}{order.guestCount?` · ${order.guestCount} guests`:""}</div>
        </div>
        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
          {isLate && <span style={S.tag("#B8473A")}>LATE</span>}
          {order.specialNotes && <span style={S.tag("#C9A24B")}>⚠️</span>}
          <span style={{ color:"#52617A" }}>{expanded?"▲":"▼"}</span>
        </div>
      </div>
      {expanded && <div style={{ marginTop:12 }}>
        {order.specialNotes && <div style={S.cardWarn}><div style={{ fontSize:11, color:"#C9A24B", fontWeight:700 }}>⚠️ SPECIAL PREP</div><div style={{ fontSize:13 }}>{order.specialNotes}</div></div>}
        {order.items.map((item,i) => <div key={i} style={{ fontSize:13, padding:"2px 0" }}>• {typeof item === "string" ? item : JSON.stringify(item)}</div>)}
        <div style={S.div} />
        <InteractionLog interactions={interactions} onAdd={addInteraction} />
      </div>}
    </div>
  );
}

function OrdersTab({ data, setData }) {
  const [creating, setCreating] = useState(false);
  const active = data.orders.filter(o => !o.delivered);
  const saveOrder = (order) => { setData(d=>{ const nd={...d,orders:[order,...d.orders]}; saveData(nd); return nd; }); setCreating(false); };
  const updateOrder = (u) => { setData(d=>{ const nd={...d,orders:d.orders.map(o=>o.id===u.id?u:o)}; saveData(nd); return nd; }); };
  if (creating) return <NewOrder onSave={saveOrder} onCancel={()=>setCreating(false)} />;
  return <div style={S.sec}>
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
      <h2 style={{ margin:0, fontSize:21, fontWeight:700, letterSpacing:"-0.01em" }}>🛎 Active Orders</h2>
      <button style={S.btn()} onClick={()=>setCreating(true)}>+ New Order</button>
    </div>
    {active.length===0
      ? <div style={S.empty}><div style={{ fontSize:40 }}>🍽</div><div>No active orders</div><div style={{ fontSize:12, marginTop:4 }}>Tap + New Order to start</div></div>
      : active.map(o=><ActiveOrderCard key={o.id} order={o} onUpdate={updateOrder} />)}
  </div>;
}

// ─── AMENITIES TAB ────────────────────────────────────────────────────────────
// Workflow: Register multiple amenities (one per room) → Batch check all items
// across all rooms gathered on the table → Deliver one room at a time.

const AMENITY_SCAN_PROMPT = "This is a screenshot from a hotel Service Optimization system (Amadeus) showing an IRD-AMENITY service order. Extract and respond ONLY with valid JSON, no markdown:\n{\"guestName\":\"guest name from GUEST section, empty if 'Guest Related' or blank\",\"orderTaker\":\"name from PERSONNEL REQUESTOR field\",\"roomNumber\":\"room number from LOCATION (just the number, if Room Move take the destination/lower room number)\",\"guestCount\":\"\",\"deliveryTime\":\"if remarks contain a specific time like 'DELIVER AT 12:30PM' extract as HH:MM 24h, else empty string\",\"orderTime\":\"\",\"items\":[\"each distinct amenity item parsed from the Remarks text, split on '+' symbols, e.g. 'FIFA Tier 1 ame + 2 FIFA kids amenity + (1) Water + pp card' becomes ['FIFA Tier 1 Amenity','2x FIFA Kids Amenity','1x Water','PP Card']\"],\"specialNotes\":\"any urgency flags like Suite designation, room move notes, or other special instructions, empty if none\"}";

// ── REGISTER FLOW: Photo → Details → Items → Save (registered, not yet checked/delivered) ──
const REGISTER_STEPS = ["Photo","Details","Items","Saved"];

function RegisterAmenity({ onSave, onCancel }) {
  const [step, setStep] = useState(0);
  const [roomNumber, setRoomNumber] = useState("");
  const [guestName, setGuestName] = useState("");
  const [requestor, setRequestor] = useState("");
  const [dueTime, setDueTime] = useState("");
  const [orderTime, setOrderTime] = useState(timeNow());
  const [items, setItems] = useState([]);
  const [specialNotes, setSpecialNotes] = useState("");
  const [manualItem, setManualItem] = useState("");

  const applyExtracted = (p) => {
    if (p.guestName) setGuestName(p.guestName);
    if (p.orderTaker) setRequestor(p.orderTaker);
    if (p.roomNumber) setRoomNumber(p.roomNumber);
    if (p.deliveryTime) setDueTime(p.deliveryTime);
    if (p.specialNotes) setSpecialNotes(p.specialNotes);
    if (p.items?.length > 0) {
      // Defensive: AI sometimes returns items as objects instead of strings — force to string
      const safeItems = p.items.map(it => {
        if (typeof it === "string") return it;
        if (it && typeof it === "object") {
          // Try common shapes: {name, qty}, {item, quantity}, etc.
          return it.name || it.item || it.label || JSON.stringify(it);
        }
        return String(it);
      });
      setItems(safeItems);
    }
    setStep(1);
  };

  const addItem = (label) => setItems(p=>[...p,label]);
  const removeItem = (i) => setItems(p=>p.filter((_,j)=>j!==i));

  const finish = () => {
    onSave({
      id: uid(), roomNumber, guestName, requestor, dueTime, orderTime, items,
      status: "registered", // registered -> checked -> delivered
      dnd: false, interactions: [], specialNotes,
      createdAt: new Date().toISOString(),
    });
  };

  const NoteBanner = () => specialNotes ? <div style={S.cardWarn}><div style={{ fontSize: 11, color: "#C9A24B", fontWeight: 700 }}>⚠️ NOTE</div><div style={{ fontSize: 13 }}>{specialNotes}</div></div> : null;

  return <div style={S.sec}>
    <div style={{ display: "flex", gap: 5, marginBottom: 14 }}>
      {REGISTER_STEPS.map((s,i) => <div key={s} style={{ flex: 1, height: 4, borderRadius: 3, background: i<=step?T.brass:T.line, transition:"background 0.2s" }} />)}
    </div>
    <div style={{ fontSize: 10.5, color: T.brass, marginBottom: 16, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700 }}>
      Step {step+1}/{REGISTER_STEPS.length} — {REGISTER_STEPS[step]}
    </div>

    {step===0 && <PhotoScanner
      onExtracted={applyExtracted}
      onSkip={()=>setStep(1)}
      scanPrompt={AMENITY_SCAN_PROMPT}
      scanTitle="📷 Scan Amenity Order"
      scanSubtitle="Take a photo of the Service Optimization screen — AI fills in room, guest, and items."
    />}

    {step===1 && <div>
      <h2 style={{ margin:"0 0 14px", fontSize:21, fontWeight:700, letterSpacing:"-0.01em" }}>🎁 Amenity Details</h2>
      <label style={S.lbl}>Room Number *</label>
      <input style={{ ...S.inp, fontSize:22, fontWeight:700, marginBottom:10 }} placeholder="508" value={roomNumber} onChange={e=>setRoomNumber(e.target.value)} inputMode="numeric" />
      <label style={S.lbl}>Guest Last Name</label>
      <input style={{ ...S.inp, marginBottom:10 }} placeholder="Optional" value={guestName} onChange={e=>setGuestName(e.target.value)} />
      <label style={S.lbl}>Requested By</label>
      <input style={{ ...S.inp, marginBottom:10 }} placeholder="e.g. William Harris" value={requestor} onChange={e=>setRequestor(e.target.value)} />
      <div style={{ display:"flex", gap:8, marginBottom:10 }}>
        <div style={{ flex:1 }}><label style={S.lbl}>Order Time</label><input style={S.inp} type="time" value={orderTime} onChange={e=>setOrderTime(e.target.value)} /></div>
        <div style={{ flex:1 }}><label style={S.lbl}>Deliver By</label><input style={S.inp} type="time" value={dueTime} onChange={e=>setDueTime(e.target.value)} /></div>
      </div>
      <label style={S.lbl}>Special Notes</label>
      <input style={{ ...S.inp, marginBottom:8 }} placeholder="e.g. Suite — urgent, room move" value={specialNotes} onChange={e=>setSpecialNotes(e.target.value)} />
      <NoteBanner />
      <button style={S.btnB()} onClick={()=>roomNumber.trim()&&setStep(2)} disabled={!roomNumber.trim()}>Next: Add Items →</button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(0)}>← Retake Photo</button>
      <button style={S.btnB("ghost")} onClick={onCancel}>Cancel</button>
    </div>}

    {step===2 && <div>
      <h2 style={{ margin:"0 0 4px", fontSize:21, fontWeight:700, letterSpacing:"-0.01em" }}>🎁 Amenity Items</h2>
      <p style={{ color:"#7C8BA3", fontSize:13, marginBottom:10 }}>Items pulled from scan, or add manually. You'll check these off in the batch table check later.</p>
      <NoteBanner />
      {items.length > 0 && <div style={{ ...S.card, marginBottom:10 }}>
        <div style={{ fontSize:11, color:"#7C8BA3", fontWeight:700, marginBottom:6 }}>ITEMS ({items.length})</div>
        {items.map((item,i) => <div key={i} style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid #23304A44", gap:8 }}>
          <span style={{ fontSize:13, flex:1 }}>• {typeof item === "string" ? item : JSON.stringify(item)}</span>
          <button style={{ background:"none", border:"none", color:"#B8473A", cursor:"pointer", fontSize:15, flexShrink:0 }} onClick={()=>removeItem(i)}>✕</button>
        </div>)}
      </div>}
      <label style={S.lbl}>Add item manually</label>
      <div style={{ display:"flex", gap:8 }}>
        <input style={{ ...S.inp, flex:1 }} placeholder="e.g. Champagne, Strawberries" value={manualItem} onChange={e=>setManualItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(manualItem.trim()&&(addItem(manualItem.trim()),setManualItem("")))} />
        <button style={S.btn("sec")} onClick={()=>{ if(manualItem.trim()){ addItem(manualItem.trim()); setManualItem(""); }}}>Add</button>
      </div>
      <button style={S.btnB("ok")} onClick={()=>items.length>0&&setStep(3)} disabled={items.length===0}>Register Amenity ✓</button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(1)}>← Back</button>
    </div>}

    {step===3 && <div style={{ textAlign:"center", padding:"24px 0" }}>
      <div style={{ fontSize:56, marginBottom:10 }}>📋</div>
      <h2 style={{ margin:"0 0 6px", fontSize:22, fontWeight:700, letterSpacing:"-0.01em" }}>Amenity Registered!</h2>
      <div style={{ color:"#7C8BA3", marginBottom:4 }}>Room {roomNumber} added to pending list</div>
      <div style={{ ...S.card, textAlign:"left", marginTop:16 }}>
        {guestName && <div style={{ fontSize:12, color:"#7C8BA3" }}>Guest: {guestName}</div>}
        {items.map((item,i) => <div key={i} style={{ fontSize:13, padding:"2px 0" }}>• {typeof item === "string" ? item : JSON.stringify(item)}</div>)}
        {specialNotes && <div style={{ fontSize:12, color:"#C9A24B", marginTop:6 }}>⚠️ {specialNotes}</div>}
      </div>
      <p style={{ fontSize:12, color:"#7C8BA3", marginTop:12 }}>Register more rooms, then run the batch table check when ready.</p>
      <button style={S.btnB("ok")} onClick={finish}>Done — Register Another or Go Back</button>
    </div>}
  </div>;
}

// ── BATCH CHECKLIST: confirm every item across ALL registered rooms is on the table ──
function BatchChecklist({ amenities, onComplete, onCancel }) {
  const [checked, setChecked] = useState(() => {
    const init = {};
    amenities.forEach(a => { init[a.id] = a.items.map(() => false); });
    return init;
  });

  const toggleItem = (amenityId, itemIdx) => {
    setChecked(prev => ({
      ...prev,
      [amenityId]: prev[amenityId].map((v,j) => j===itemIdx ? !v : v)
    }));
  };

  const totalItems = amenities.reduce((sum,a) => sum + a.items.length, 0);
  const checkedCount = Object.values(checked).reduce((sum,arr) => sum + arr.filter(Boolean).length, 0);
  const allChecked = totalItems > 0 && checkedCount === totalItems;

  return <div style={S.sec}>
    <h2 style={{ margin:"0 0 4px", fontSize:21, fontWeight:700, letterSpacing:"-0.01em" }}>🧾 Batch Table Check</h2>
    <p style={{ color:"#7C8BA3", fontSize:13, marginBottom:6 }}>Confirm every item for every room is gathered on the table.</p>
    <div style={{ fontSize:13, color: allChecked ? "#4F9C7E" : "#C9A24B", fontWeight:700, marginBottom:14 }}>
      {checkedCount} / {totalItems} items checked
    </div>

    {amenities.map(a => (
      <div key={a.id} style={{ ...S.card, marginBottom:12 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <div style={{ fontWeight:700, fontSize:16 }}>Room {a.roomNumber}{a.guestName?` · ${a.guestName}`:""}</div>
          {a.specialNotes && <span style={S.tag("#C9A24B")}>⚠️</span>}
        </div>
        {a.specialNotes && <div style={{ fontSize:12, color:"#C9A24B", marginBottom:8 }}>{a.specialNotes}</div>}
        <Checklist items={a.items} checked={checked[a.id]} onToggle={(i)=>toggleItem(a.id,i)} />
      </div>
    ))}

    {!allChecked && <div style={{ color:"#B8473A", fontSize:12, marginBottom:8, textAlign:"center" }}>⚠️ Check off every item before proceeding to delivery.</div>}
    <button style={S.btnB(allChecked?"ok":"sec")} onClick={()=>allChecked&&onComplete()} disabled={!allChecked}>
      {allChecked ? "✓ All Confirmed — Start Deliveries" : "Check all items first"}
    </button>
    <button style={S.btnB("ghost")} onClick={onCancel}>← Back</button>
  </div>;
}

// ── DELIVER ONE: at-the-door confirmation for a single room from the batch ──
function DeliverAmenity({ amenity, onDelivered, onDND, onBack }) {
  const [interactions, setInteractions] = useState(amenity.interactions || []);
  const addInteraction = (note) => setInteractions(p => [...p, { note, time: timeNow() }]);

  return <div style={S.sec}>
    <h2 style={{ margin:"0 0 4px", fontSize:21, fontWeight:700, letterSpacing:"-0.01em" }}>🚪 Deliver — Room {amenity.roomNumber}</h2>
    <p style={{ color:"#7C8BA3", fontSize:13, marginBottom:12 }}>Confirm delivery. Log any guest interactions.</p>
    <div style={S.card}>
      <div style={{ fontWeight:700, marginBottom:4 }}>Room {amenity.roomNumber}{amenity.guestName?` · ${amenity.guestName}`:""}</div>
      {amenity.requestor && <div style={{ fontSize:12, color:"#7C8BA3", marginBottom:6 }}>Requested by: {amenity.requestor}</div>}
      {amenity.specialNotes && <div style={{ fontSize:12, color:"#C9A24B", marginBottom:8 }}>⚠️ {amenity.specialNotes}</div>}
      {amenity.items.map((item,i) => <div key={i} style={{ fontSize:13, padding:"2px 0" }}>✅ {typeof item === "string" ? item : JSON.stringify(item)}</div>)}
    </div>
    <label style={{ ...S.lbl, marginTop:8 }}>Guest Interactions</label>
    <InteractionLog interactions={interactions} onAdd={addInteraction} />
    <button style={S.btnB("ok")} onClick={()=>onDelivered(interactions)}>✓ Delivered</button>
    <button style={S.btnB("sec")} onClick={()=>onDND(interactions)}>🚫 Mark DND</button>
    <button style={S.btnB("ghost")} onClick={onBack}>← Back to List</button>
  </div>;
}

function AmenityCard({ amenity, onUpdate }) {
  const [expanded, setExpanded] = useState(false);
  const [editing, setEditing] = useState(false);
  const [interactions, setInteractions] = useState(amenity.interactions||[]);
  const addInteraction = (note) => { const u=[...interactions,{note,time:timeNow()}]; setInteractions(u); onUpdate({...amenity,interactions:u}); };

  // Edit state — separate from amenity until saved
  const [editItems, setEditItems] = useState(amenity.items);
  const [editNotes, setEditNotes] = useState(amenity.specialNotes || "");
  const [editGuestName, setEditGuestName] = useState(amenity.guestName || "");
  const [editDueTime, setEditDueTime] = useState(amenity.dueTime || "");
  const [newItem, setNewItem] = useState("");

  const startEdit = () => {
    setEditItems(amenity.items);
    setEditNotes(amenity.specialNotes || "");
    setEditGuestName(amenity.guestName || "");
    setEditDueTime(amenity.dueTime || "");
    setEditing(true);
    setExpanded(true);
  };
  const addEditItem = () => { if (newItem.trim()) { setEditItems(p=>[...p,newItem.trim()]); setNewItem(""); } };
  const removeEditItem = (i) => setEditItems(p=>p.filter((_,j)=>j!==i));
  const saveEdit = () => {
    onUpdate({ ...amenity, items: editItems, specialNotes: editNotes, guestName: editGuestName, dueTime: editDueTime });
    setEditing(false);
  };
  const cancelEdit = () => setEditing(false);

  // DND takes priority over any status — a DND'd room is DND regardless of where it was in the pipeline
  const statusTag = amenity.dnd ? { color:"#7C8BA3", label:"🚫 DND" }
    : amenity.status === "registered" ? { color:"#C9A24B", label:"📋 Registered" }
    : amenity.status === "checked" ? { color:"#7C8BA3", label:"🧾 Checked" }
    : { color:"#4F9C7E", label:"✓ Done" };

  // Remember the status before DND so Undo can restore it correctly
  const markDND = () => onUpdate({ ...amenity, dnd: true, statusBeforeDND: amenity.status, status: "delivered", completedAt: new Date().toISOString() });
  const undoDND = () => onUpdate({ ...amenity, dnd: false, status: amenity.statusBeforeDND || "registered", completedAt: null });

  return <div style={S.card}>
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", cursor:"pointer" }} onClick={()=>{ if(!editing) setExpanded(e=>!e); }}>
      <div>
        <div style={{ fontWeight:700, fontSize:18 }}>Room {amenity.roomNumber}{amenity.guestName?` · ${amenity.guestName}`:""}</div>
        <div style={{ fontSize:12, color:"#7C8BA3" }}>{amenity.items.length} items</div>
      </div>
      <div style={{ display:"flex", gap:6, alignItems:"center" }}>
        <span style={S.tag(statusTag.color)}>{statusTag.label}</span>
        <span style={{ color:"#52617A" }}>{expanded?"▲":"▼"}</span>
      </div>
    </div>

    {expanded && !editing && <div style={{ marginTop:12 }}>
      {amenity.specialNotes && <div style={S.cardWarn}><div style={{ fontSize:11, color:"#C9A24B", fontWeight:700 }}>⚠️ NOTE</div><div style={{ fontSize:13 }}>{amenity.specialNotes}</div></div>}
      {amenity.items.map((item,i) => <div key={i} style={{ fontSize:13, padding:"2px 0" }}>• {typeof item === "string" ? item : JSON.stringify(item)}</div>)}
      <div style={S.div} />
      {!amenity.dnd && amenity.status !== "delivered" && (
        <button style={{ ...S.btn("sec"), width: "100%", marginBottom: 8 }} onClick={startEdit}>✏️ Edit Amenity</button>
      )}
      {amenity.dnd ? (
        <button style={{ ...S.btn("ok"), width: "100%", marginBottom: 10 }} onClick={undoDND}>↩️ Undo DND</button>
      ) : amenity.status !== "delivered" && (
        <button style={{ ...S.btn("sec"), width: "100%", marginBottom: 10 }} onClick={markDND}>🚫 Mark Room DND</button>
      )}

      <InteractionLog interactions={interactions} onAdd={addInteraction} />
    </div>}

    {expanded && editing && <div style={{ marginTop:12 }}>
      <div style={{ fontSize:11, color:"#C9A24B", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:10 }}>✏️ Editing Amenity</div>

      <label style={S.lbl}>Guest Name</label>
      <input style={{ ...S.inp, marginBottom:10 }} placeholder="Optional" value={editGuestName} onChange={e=>setEditGuestName(e.target.value)} />

      <label style={S.lbl}>Deliver By</label>
      <input style={{ ...S.inp, marginBottom:10 }} type="time" value={editDueTime} onChange={e=>setEditDueTime(e.target.value)} />

      <label style={S.lbl}>Special Notes</label>
      <input style={{ ...S.inp, marginBottom:12 }} placeholder="e.g. Suite — urgent" value={editNotes} onChange={e=>setEditNotes(e.target.value)} />

      <label style={S.lbl}>Items ({editItems.length})</label>
      <div style={{ marginBottom:8 }}>
        {editItems.map((item,i) => (
          <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 0", borderBottom:"1px solid #23304A44" }}>
            <span style={{ fontSize:13 }}>• {typeof item === "string" ? item : JSON.stringify(item)}</span>
            <button style={{ background:"none", border:"none", color:"#B8473A", cursor:"pointer", fontSize:15 }} onClick={()=>removeEditItem(i)}>✕</button>
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        <input style={{ ...S.inp, flex:1 }} placeholder="Add last-minute item…" value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addEditItem()} />
        <button style={S.btn("sec")} onClick={addEditItem}>Add</button>
      </div>

      <button style={S.btnB("ok")} onClick={saveEdit} disabled={editItems.length===0}>Save Changes</button>
      <button style={S.btnB("ghost")} onClick={cancelEdit}>Cancel</button>
    </div>}
  </div>;
}

// ── ROOM PICKER: choose which room to deliver next, grouped by wing, sorted by floor/room ──
function DeliveryRoomPicker({ queue, onPick, onBack }) {
  const grouped = {};
  queue.forEach(a => {
    const { wing } = parseRoom(a.roomNumber);
    if (!grouped[wing]) grouped[wing] = [];
    grouped[wing].push(a);
  });
  const wingOrder = ["Wilshire Wing", "Beverly Wing", "Other"];
  const wingIcons = { "Wilshire Wing": "🏛️", "Beverly Wing": "🏨", "Other": "📍" };

  return <div style={S.sec}>
    <h2 style={{ margin:"0 0 4px", fontSize:21, fontWeight:700, letterSpacing:"-0.01em" }}>🚪 Choose Room to Deliver</h2>
    <p style={{ color:"#7C8BA3", fontSize:13, marginBottom:14 }}>{queue.length} room{queue.length!==1?"s":""} ready — tap one to start delivery.</p>

    {wingOrder.filter(w => grouped[w]?.length > 0).map(wing => (
      <div key={wing} style={{ marginBottom: 16 }}>
        <div style={{ fontSize:12, color:"#C9A24B", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:8 }}>
          {wingIcons[wing]} {wing} ({grouped[wing].length})
        </div>
        {grouped[wing].map(a => {
          const { floor, room } = parseRoom(a.roomNumber);
          return (
            <div key={a.id} onClick={()=>onPick(a.id)} style={{ ...S.card, marginBottom:8, cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontWeight:700, fontSize:17 }}>Room {a.roomNumber}{a.guestName?` · ${a.guestName}`:""}</div>
                <div style={{ fontSize:12, color:"#7C8BA3" }}>Floor {floor} · {a.items.length} items{a.dueTime?` · Due ${a.dueTime}`:""}</div>
                {a.specialNotes && <div style={{ fontSize:12, color:"#C9A24B", marginTop:2 }}>⚠️ {a.specialNotes}</div>}
              </div>
              <span style={{ fontSize:22, color:"#4F9C7E" }}>→</span>
            </div>
          );
        })}
      </div>
    ))}

    <button style={S.btnB("ghost")} onClick={onBack}>← Back to List</button>
  </div>;
}

function AmenitiesTab({ data, setData }) {
  const [mode, setMode] = useState("list"); // list | registering | batchCheck | pickRoom | delivering
  const [deliverRoomId, setDeliverRoomId] = useState(null);

  // DND can be marked at any stage — once DND, a room drops out of the active pipeline
  const registered = data.amenities.filter(a => a.status === "registered" && !a.dnd).sort(sortByRoom);
  const checkedQueue = data.amenities.filter(a => a.status === "checked" && !a.dnd).sort(sortByRoom);
  const dndRooms = data.amenities.filter(a => a.dnd).sort(sortByRoom);
  const delivered = data.amenities.filter(a => a.status === "delivered" && !a.dnd);

  const saveAmenity = (a) => { setData(d=>{ const nd={...d,amenities:[a,...d.amenities]}; saveData(nd); return nd; }); };
  const updateAmenity = (u) => { setData(d=>{ const nd={...d,amenities:d.amenities.map(a=>a.id===u.id?u:a)}; saveData(nd); return nd; }); };

  const handleRegisterSave = (a) => { saveAmenity(a); setMode("list"); };

  const handleBatchComplete = () => {
    setData(d => {
      const nd = { ...d, amenities: d.amenities.map(a => (a.status === "registered" && !a.dnd) ? { ...a, status: "checked" } : a) };
      saveData(nd);
      return nd;
    });
    setMode("pickRoom");
  };

  const handleDelivered = (interactions) => {
    const current = data.amenities.find(a => a.id === deliverRoomId);
    if (current) updateAmenity({ ...current, status: "delivered", interactions, completedAt: new Date().toISOString() });
    setDeliverRoomId(null);
    setMode("pickRoom");
  };
  const handleDND = (interactions) => {
    const current = data.amenities.find(a => a.id === deliverRoomId);
    if (current) updateAmenity({ ...current, statusBeforeDND: current.status, status: "delivered", dnd: true, interactions, completedAt: new Date().toISOString() });
    setDeliverRoomId(null);
    setMode("pickRoom");
  };

  if (mode === "registering") {
    return <RegisterAmenity onSave={handleRegisterSave} onCancel={()=>setMode("list")} />;
  }

  if (mode === "batchCheck") {
    return <BatchChecklist amenities={registered} onComplete={handleBatchComplete} onCancel={()=>setMode("list")} />;
  }

  if (mode === "pickRoom") {
    const liveQueue = data.amenities.filter(a => a.status === "checked" && !a.dnd).sort(sortByRoom);
    if (liveQueue.length === 0) { setMode("list"); return null; }
    return <DeliveryRoomPicker
      queue={liveQueue}
      onPick={(id) => { setDeliverRoomId(id); setMode("delivering"); }}
      onBack={()=>setMode("list")}
    />;
  }

  if (mode === "delivering") {
    const current = data.amenities.find(a => a.id === deliverRoomId);
    if (!current || current.status !== "checked" || current.dnd) { setMode("pickRoom"); return null; }
    return <DeliverAmenity
      amenity={current}
      onDelivered={handleDelivered}
      onDND={handleDND}
      onBack={()=>setMode("pickRoom")}
    />;
  }

  return <div style={S.sec}>

// Flat list of every item across all menus for instant search
const ALL_ITEMS = Object.entries(MENUS).flatMap(([menuName, categories]) =>
  categories.flatMap(cat =>
    cat.items.map(item => ({ ...item, menuName, category: cat.category }))
  )
);

function MenuTab() {
  const [search, setSearch] = useState("");
  const [activeMenu, setActiveMenu] = useState("All");
  const [activeCat, setActiveCat] = useState(null);
  const [expanded, setExpanded] = useState(null);

  const menuNames = ["All", ...Object.keys(MENUS)];
  const query = search.toLowerCase().trim();

  // Filter by menu first
  const byMenu = activeMenu === "All" ? ALL_ITEMS : ALL_ITEMS.filter(i => i.menuName === activeMenu);

  // Then by category pill (only when no search active)
  const categories = [...new Set(byMenu.map(i => i.category))];

  // Then apply search or category filter
  const results = query
    ? byMenu.filter(i =>
        i.name.toLowerCase().includes(query) ||
        (i.note || "").toLowerCase().includes(query) ||
        i.category.toLowerCase().includes(query) ||
        (i.tags || []).some(t => t.toLowerCase().includes(query))
      )
    : activeCat
      ? byMenu.filter(i => i.category === activeCat)
      : byMenu;

  const toggleExpand = (key) => setExpanded(e => e === key ? null : key);

  return (
    <div style={S.sec}>
      <h2 style={{ margin: "0 0 14px", fontSize: 21, fontWeight: 700, letterSpacing: "-0.01em" }}>🔎 Menu Lookup</h2>

      {/* Search bar */}
      <div style={{ position: "relative", marginBottom: 10 }}>
        <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 15 }}>🔍</span>
        <input
          style={{ ...S.inp, paddingLeft: 36, fontSize: 15 }}
          placeholder="Search any item, ingredient, tag…"
          value={search}
          onChange={e => { setSearch(e.target.value); setActiveCat(null); }}
          autoFocus={false}
        />
        {search && (
          <button onClick={() => setSearch("")} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#7C8BA3", cursor: "pointer", fontSize: 18 }}>✕</button>
        )}
      </div>

      {/* Menu type pills */}
      <div style={{ display: "flex", gap: 5, overflowX: "auto", paddingBottom: 6, marginBottom: 6 }}>
        {menuNames.map(m => (
          <button key={m} onClick={() => { setActiveMenu(m); setActiveCat(null); setSearch(""); }}
            style={{ padding: "5px 11px", borderRadius: 20, border: `1px solid ${activeMenu === m ? "#C9A24B" : "#23304A"}`, background: activeMenu === m ? "#C9A24B22" : "#0B1220", color: activeMenu === m ? "#C9A24B" : "#7C8BA3", cursor: "pointer", fontSize: 12, whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 4 }}>
            {MENU_ICONS[m] && <span>{MENU_ICONS[m]}</span>}<span>{m}</span>
          </button>
        ))}
      </div>

      {/* Category pills — only show when no search active */}
      {!search && (
        <div style={{ display: "flex", gap: 5, overflowX: "auto", paddingBottom: 6, marginBottom: 8 }}>
          <button onClick={() => setActiveCat(null)} style={{ padding: "4px 10px", borderRadius: 20, border: `1px solid ${!activeCat ? "#C9A24B" : "#23304A"}`, background: !activeCat ? "#C9A24B22" : "#0B1220", color: !activeCat ? "#C9A24B" : "#52617A", cursor: "pointer", fontSize: 11, whiteSpace: "nowrap" }}>All</button>
          {categories.map(cat => (
            <button key={cat} onClick={() => setActiveCat(cat === activeCat ? null : cat)}
              style={{ padding: "4px 10px", borderRadius: 20, border: `1px solid ${activeCat === cat ? "#C9A24B" : "#23304A"}`, background: activeCat === cat ? "#C9A24B22" : "#0B1220", color: activeCat === cat ? "#C9A24B" : "#52617A", cursor: "pointer", fontSize: 11, whiteSpace: "nowrap" }}>
              {cat}
            </button>
          ))}
        </div>
      )}

      {/* Result count */}
      <div style={{ fontSize: 11, color: "#52617A", marginBottom: 10 }}>
        {query ? `${results.length} result${results.length !== 1 ? "s" : ""} for "${query}"` : `${results.length} items`}
      </div>

      {/* Results */}
      {results.length === 0 && (
        <div style={S.empty}>
          <div style={{ fontSize: 36 }}>🍽</div>
          <div>No items found</div>
          <div style={{ fontSize: 12, marginTop: 4 }}>Try a different search</div>
        </div>
      )}

      <div>
        {results.map((item, idx) => {
          const key = `${item.menuName}-${item.name}-${idx}`;
          const isOpen = expanded === key;
          return (
            <div key={key} style={{ ...S.card, padding: 0, overflow: "hidden", marginBottom: 8 }}>
              {/* Item row */}
              <div onClick={() => toggleExpand(key)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", cursor: "pointer" }}>
                <div style={{ flex: 1, paddingRight: 10 }}>
                  <div style={{ fontWeight: 600, fontSize: 15 }}>{item.name}</div>
                  <div style={{ display: "flex", gap: 5, marginTop: 3, flexWrap: "wrap", alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: "#52617A" }}>{MENU_ICONS[item.menuName]} {item.menuName}</span>
                    <span style={{ fontSize: 11, color: "#23304A" }}>·</span>
                    <span style={{ fontSize: 11, color: "#52617A" }}>{item.category}</span>
                    {(item.tags || []).map(t => <DietTag key={t} tag={t} />)}
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                  <span style={{ fontSize: 16, fontWeight: 700, color: "#C9A24B" }}>${item.price}</span>
                  <span style={{ fontSize: 14, color: "#52617A" }}>{isOpen ? "▲" : "▼"}</span>
                </div>
              </div>

              {/* Expanded detail */}
              {isOpen && (
                <div style={{ borderTop: "1px solid #23304A", padding: "12px 14px", background: "#0B1220" }}>
                  {item.note && (
                    <div style={{ marginBottom: 10 }}>
                      <div style={{ fontSize: 11, color: "#7C8BA3", fontWeight: 700, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.05em" }}>Description</div>
                      <div style={{ fontSize: 13, color: "#E8E4DA", lineHeight: 1.5 }}>{item.note}</div>
                    </div>
                  )}
                  {item.options && item.options.length > 0 && (
                    <div>
                      <div style={{ fontSize: 11, color: "#7C8BA3", fontWeight: 700, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>Options</div>
                      {item.options.map(opt => (
                        <div key={opt.label} style={{ marginBottom: 6 }}>
                          <span style={{ fontSize: 12, color: "#C9A24B", fontWeight: 600 }}>{opt.label}: </span>
                          <span style={{ fontSize: 12, color: "#7C8BA3" }}>{opt.choices.join(", ")}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #23304A44", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontSize: 12, color: "#52617A" }}>
                      +17% service · +3.5% admin · +$7 delivery
                    </div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: "#C9A24B" }}>${item.price}</div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

const APP_VERSION = "1.8.1";
