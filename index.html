function getTableSetup(items, guestCount) {
  const setup = new Set();
  const n = guestCount || 1;

  // ── GLOBAL ────────────────────────────────────────────────────────────────
  setup.add(`${n}x Ice Water`);
  setup.add("Salt & Pepper");
  setup.add("Butter on Bread Rolls");

  items.forEach(raw => {
    const item = (raw || "").toLowerCase();

    // ── INHERITANCE: sub-components ─────────────────────────────────────────

    // Fries
    if (item.includes("fries") || item.includes("french fries")) {
      setup.add("Ketchup / Mayo / Mustard");
    }
    // Side salad
    if (item.includes("side salad") || item.includes("small mixed greens")) {
      setup.add("Dressing");
    }
    // Toast breads
    if (TOAST_BREADS.some(b => item.includes(b))) {
      setup.add("Butter & Preserves");
    }
    // Juice
    if ((item.includes("juice") || item.includes("beet detox") || item.includes("healthy greens juice")) && !item.includes("orange juice latte")) {
      setup.add("Empty Water Glass");
    }
    // Coffee / hot bev
    if (item.includes("pot of coffee") || item.includes("cappuccino") || item.includes("latte") || item.includes("chai latte") || item.includes("matcha latte")) {
      setup.add("Mug Setup (x2)"); setup.add("Cream"); setup.add("Sugar");
    }
    if (item.includes("espresso") || item.includes("macchiato") || item.includes("americano")) {
      setup.add("Sugar"); setup.add("Small Spoon");
    }
    // Tea
    if (item.includes("tea") && !item.includes("iced tea")) {
      setup.add("Mug Setup"); setup.add("Tea Bags"); setup.add("Sugar"); setup.add("Honey"); setup.add("Hot Water");
    }
    if (item.includes("iced tea")) {
      setup.add("Glass of Ice"); setup.add("Straw");
    }
    // Fruit / berries
    if (item.includes("berries") || item.includes("fruit bowl") || item.includes("fruit plate") || item.includes("small fruit")) {
      setup.add("Small Fork");
    }

    // ── SPECIFIC ITEMS ───────────────────────────────────────────────────────

    // Breakfast Collections (composite)
    if (item.includes("pretty woman egg white omelet") || item.includes("california dreaming")) {
      setup.add("Empty Water Glass"); setup.add("Mug Setup (x2)"); setup.add("Cream"); setup.add("Sugar"); setup.add("Ketchup");

    if (item.includes("beverly continental")) {
      setup.add("Butter & Preserves");
    }

    if (item.includes("three egg omelet") || item.includes("two eggs any style") || item.includes("santa monica") || item.includes("benedict")) {

    }
    if (item.includes("lemonade")) {
      setup.add("Glass of Ice"); setup.add("Straw");
    }
    if (item.includes("fresh juice") && !item.includes("orange juice latte")) {
      setup.add("Empty Water Glass");
    }

    // Alcohol — wine bottle / bubbles → ice bucket
    if (BUBBLE_KEYWORDS.some(b => item.includes(b)) || (WINE_KEYWORDS.some(w => item.includes(w)) && (item.includes("bottle") || item.includes("(bottle)")))) {
      setup.add(`Ice Bucket`);
      setup.add(`${n}x Wine Glass`);
    }
    // Beer
    if (BEER_KEYWORDS.some(b => item.includes(b))) {
      setup.add("Ice Bucket"); setup.add("Empty Water Glass");
    }
    // Spirits
    if (SPIRIT_KEYWORDS.some(s => item.includes(s))) {
      setup.add("Request from BLVD Bar — Bring Empty Glass");
    }
    // OTR cocktails
    if (OTR_KEYWORDS.some(o => item.includes(o)) || item.includes("otr")) {
      setup.add("Glass of Ice");
    }

    // Kids
    if (item.includes("little angeleno")) {
      setup.add("Maple Syrup"); setup.add("Small Cup of Berries"); setup.add("Straw");
    }

    // Pet
    if (item.includes("chicken & white rice (pet)") || item.includes("beef & potato (pet)") || item.includes("mac & tuna") || item.includes("bone appetit") || item.includes("peanut butter cookies (pet)") || item.includes("san benedetto")) {
      setup.add("Dog Bowl");
    }

    // ── OPEN / CUSTOM ITEMS ──────────────────────────────────────────────────
    // "Open Food", "Open Beverage", "Open Bar", "Open Dessert" etc.
    // Look at the description after the dash to infer setup
    if (item.startsWith("open ")) {
      // Extract description after dash
      const desc = item.includes("—") ? item.split("—")[1].trim() : item.replace(/^open\s+\w+\s*/i, "");

      // Beverage hints
      if (desc.includes("juice") || desc.includes("watermelon") || desc.includes("lemonade")) {
        setup.add("Empty Water Glass");
      }
      if (desc.includes("coffee") || desc.includes("cappuccino") || desc.includes("latte")) {
        setup.add("Mug Setup (x2)"); setup.add("Cream"); setup.add("Sugar");
      }
      if (desc.includes("tea")) {
        setup.add("Mug Setup"); setup.add("Tea Bags"); setup.add("Sugar"); setup.add("Honey"); setup.add("Hot Water");
      }
      if (desc.includes("soda") || desc.includes("coke") || desc.includes("sprite") || desc.includes("red bull") || desc.includes("iced") || desc.includes("cold")) {
        setup.add("Glass of Ice"); setup.add("Straw");
      }
      if (desc.includes("wine") || desc.includes("champagne") || desc.includes("prosecco")) {
        setup.add("Ice Bucket"); setup.add(`${n}x Wine Glass`);
      }
      if (desc.includes("beer")) {
        setup.add("Ice Bucket"); setup.add("Empty Water Glass");
      }
      if (SPIRIT_KEYWORDS.some(s => desc.includes(s))) {
        setup.add("Request from BLVD Bar — Bring Empty Glass");
      }

      // Food hints
      if (desc.includes("ice cream") || desc.includes("sorbet")) {
        setup.add("Spoon");
      }
      if (desc.includes("cake") || desc.includes("tart") || desc.includes("pie") || desc.includes("cheesecake")) {
        setup.add("Dessert Fork");
      }
      if (desc.includes("soup")) {
        setup.add("Bread Rolls"); setup.add("Spoon");
      }
      if (desc.includes("pasta") || desc.includes("spaghetti") || desc.includes("penne") || desc.includes("fettuccine") || desc.includes("linguine")) {
        setup.add("Parmesan Cheese"); setup.add("Chili Flakes"); setup.add("Bread Rolls");
      }
      if (desc.includes("salad")) {
        setup.add("Dressing"); setup.add("Bread Rolls");
      }
      if (desc.includes("burger") || desc.includes("sandwich") || desc.includes("hot dog")) {
        setup.add("Ketchup / Mayo / Mustard");
      }
      if (desc.includes("fries") || desc.includes("chips")) {
        setup.add("Ketchup / Mayo / Mustard");
      }
      if (desc.includes("steak") || desc.includes("tenderloin") || desc.includes("strip")) {
        setup.add("Steak Knife"); setup.add("Bread Rolls");
      }
      if (desc.includes("berry") || desc.includes("berries") || desc.includes("fruit")) {
        setup.add("Small Fork");
      }
      if (desc.includes("waffle") || desc.includes("pancake") || desc.includes("french toast")) {
        setup.add("Vermont Maple Syrup"); setup.add("Seasonal Berries");
      }
      // If we can't figure it out, at least flag it
      if (setup.size === 3) { // only has the global 3 items
        setup.add("⚠️ Custom item — verify table setup manually");
      }
    }
  });

  return [...setup].sort();
}

// ─── PHOTO SCANNER ────────────────────────────────────────────────────────────
function PhotoScanner({ onExtracted, onSkip }) {
  const [status, setStatus] = useState("idle");
  const [preview, setPreview] = useState(null);
  const [logs, setLogs] = useState([]);

  const log = (msg) => setLogs(l => [...l, `${new Date().toLocaleTimeString()}: ${msg}`]);

  const handleFile = async (file) => {
    log(`handleFile called: ${file ? file.name + " " + file.size + "b" : "null"}`);
    if (!file) return;

    // Show preview
    const pr = new FileReader();
    pr.onload = (e) => setPreview(e.target.result);
    pr.readAsDataURL(file);
    setStatus("loading");
    log("Resizing...");

    // Resize via ObjectURL (doesn't block main thread unlike dataUrl)
    const getBase64 = () => new Promise((resolve) => {
      const fallback = () => {
        const fr = new FileReader();
        fr.onload = (e) => resolve(e.target.result.split(",")[1]);
        fr.readAsDataURL(file);
      };
      try {
        const objUrl = URL.createObjectURL(file);
        const timer = setTimeout(() => {
          log("Resize timeout — using original");
          URL.revokeObjectURL(objUrl);
          fallback();
        }, 8000);
        const img = new Image();
        img.onload = () => {
          clearTimeout(timer);
          URL.revokeObjectURL(objUrl);
          try {
            const MAX = 800;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
              if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
              else { w = Math.round(w * MAX / h); h = MAX; }
            }
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext("2d");
            if (!ctx) { fallback(); return; }
            ctx.drawImage(img, 0, 0, w, h);
            const b64 = canvas.toDataURL("image/jpeg", 0.7).split(",")[1];
            log(`Resized to ${w}x${h}, length: ${b64.length}`);
            resolve(b64);
          } catch (e2) { log("Canvas err: " + e2.message); fallback(); }
        };
        img.onerror = () => { clearTimeout(timer); URL.revokeObjectURL(objUrl); log("Img load failed"); fallback(); };
        img.src = objUrl;
      } catch (e1) { log("ObjectURL err: " + e1.message); fallback(); }
    });

    try {
      const base64 = await getBase64();
      log(`Calling API, base64 length: ${base64.length}`);
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 2048,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
            { type: "text", text: "You are reading a Beverly Hills hotel In-Room Dining (IRD) ticket. Extract the fields below and respond ONLY with valid JSON — no markdown, no explanation, no extra text.\n\nTICKET FORMAT RULES:\n- Guest last name: handwritten at TOP above BEV In Room Dining. May be absent.\n- Order taker: on the employee number line e.g. '10398493 Kailah' → 'Kailah'.\n- Room number: TBL field digits before slash. 'TBL 820/1' → '820'.\n- Guest count: GST field. 'GST 2' → '2'.\n- Delivery time: in Delivery Charge or FULL SERVICE SPECIAL PREP block. '855 PM'→'20:55', '6 PM'→'18:00', 'DELIVER BY 1035PM'→'22:35'. HH:MM 24h or empty.\n- Order time: bottom timestamp. '6/16/2026 7:23 PM'→'19:23'. HH:MM 24h or empty.\n- Items: every food/beverage. Leading digit is quantity, prefix >1 as Nx. Indented lines are modifiers — attach with —. Skip: Delivery Charge, FULL SERVICE, Wine Glass lines, splenda. Enhancement content appends to item above.\n- specialNotes: delivery instructions, allergies, handwritten notes, table setup from Delivery Charge block, comp notes.\n\nReturn ONLY this JSON:\n{\"guestName\":\"\",\"orderTaker\":\"\",\"roomNumber\":\"\",\"guestCount\":\"\",\"deliveryTime\":\"\",\"orderTime\":\"\",\"items\":[],\"specialNotes\":\"\"}" }
          ]}]
        })
      });
      log(`API status: ${resp.status}`);
      const data = await resp.json();
      if (!data.content) throw new Error(data.error?.message || "No content in response");
      const text = data.content.map(b => b.text || "").join("");
      const s = text.indexOf("{"), e = text.lastIndexOf("}");
      if (s === -1 || e === -1) throw new Error("No JSON in response");
      onExtracted(JSON.parse(text.slice(s, e + 1)));
      setStatus("done");
    } catch (err) {
      log(`ERROR: ${err.message}`);
      setStatus("error");
    }
  };

  // Debug log panel
  const LogPanel = () => logs.length > 0 ? (
    <div style={{ background: "#050D1A", border: "1px solid #1E3352", borderRadius: 8, padding: 10, marginTop: 12, maxHeight: 160, overflowY: "auto" }}>
      <div style={{ fontSize: 10, color: "#C9A84C", fontWeight: 700, marginBottom: 4, textTransform: "uppercase" }}>🐛 Debug Log</div>
      {logs.map((l, i) => <div key={i} style={{ fontSize: 11, color: "#7A9BBF", fontFamily: "monospace", padding: "1px 0", borderBottom: "1px solid #1E335222" }}>{l}</div>)}
    </div>
  ) : null;

  // File picker: input overlays the button at full size with opacity 0
  const filePickerBtn = (variant, label, inputProps) => (
    <div style={{ position: "relative", marginTop: 8 }}
      onClick={() => log(`Div wrapper tapped — label: ${label}`)}>
      <span style={{ ...S.btnB(variant), display: "block", textAlign: "center", boxSizing: "border-box" }}>{label}</span>
      <input {...inputProps} type="file" accept="image/*"
        style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", opacity: 0, cursor: "pointer", margin: 0, padding: 0, fontSize: 0, zIndex: 10 }}
        onClick={() => log(`Input clicked — label: ${label}`)}
        onChange={e => {
          log(`onChange fired — files: ${e.target.files?.length}`);
          if (e.target.files && e.target.files[0]) handleFile(e.target.files[0]);
        }} />
    </div>
  );

  return <div>
    <h2 style={{ margin: "0 0 8px", fontSize: 20 }}>📷 Scan Order Ticket</h2>
    <p style={{ fontSize: 13, color: "#7A9BBF", marginBottom: 16 }}>Take a photo of the ticket — AI will fill in the order automatically.</p>

    {status === "idle" && <>
      {filePickerBtn("pri", "📷 Take Photo", { capture: "environment" })}
      {filePickerBtn("sec", "🖼 Choose from Library", {})}
      <button style={S.btnB("ghost")} onClick={() => { log("Skip tapped"); onSkip(); }}>Skip — Enter Manually</button>
      <LogPanel />
    </>}

    {status === "loading" && <div style={{ textAlign: "center", padding: "30px 0" }}>
      {preview && <img src={preview} alt="ticket" style={{ width: "100%", borderRadius: 10, marginBottom: 16, opacity: 0.6 }} />}
      <div style={{ fontSize: 32, marginBottom: 8 }}>🔍</div>
      <div style={{ color: "#C9A84C", fontWeight: 600 }}>Reading ticket…</div>
      <div style={{ fontSize: 12, color: "#4A6580", marginTop: 4 }}>AI is extracting order details</div>
      <LogPanel />
    </div>}

    {status === "error" && <div style={{ textAlign: "center", padding: "20px 0" }}>
      <div style={{ fontSize: 32, marginBottom: 8 }}>⚠️</div>
      <div style={{ color: "#D94F3D", fontWeight: 600, marginBottom: 4 }}>Couldn't read ticket</div>
      <div style={{ fontSize: 12, color: "#7A9BBF", marginBottom: 12 }}>Try better lighting or a closer shot.</div>
      {filePickerBtn("pri", "📷 Try Again — Camera", { capture: "environment" })}
      {filePickerBtn("sec", "🖼 Try Again — Library", {})}
      <button style={S.btnB("ghost")} onClick={onSkip}>Enter Manually</button>
      <LogPanel />
    </div>}
  </div>;
}

// ─── NEW ORDER FLOW ───────────────────────────────────────────────────────────
const STEPS = ["Photo","Details","Items","Checklist","Delivery","Done"];

function NewOrder({ onSave, onCancel }) {
  const [step, setStep] = useState(0);
  const [roomNumber, setRoomNumber] = useState("");
  const [guestName, setGuestName] = useState("");
  const [orderTaker, setOrderTaker] = useState("");
  const [guestCount, setGuestCount] = useState("");
  const [dueTime, setDueTime] = useState("");
  const [orderTime, setOrderTime] = useState(timeNow());
  const [items, setItems] = useState([]);
  const [checked, setChecked] = useState([]);
  const [fireOn, setFireOn] = useState(false);
  const [interactions, setInteractions] = useState([]);
  const [specialNotes, setSpecialNotes] = useState("");
  const [manualItem, setManualItem] = useState("");

  const applyExtracted = (p) => {
    if (p.guestName) setGuestName(p.guestName);
    if (p.orderTaker) setOrderTaker(p.orderTaker);
    if (p.roomNumber) setRoomNumber(p.roomNumber);
    if (p.guestCount) setGuestCount(String(p.guestCount));
    if (p.deliveryTime) setDueTime(p.deliveryTime);
    if (p.orderTime) setOrderTime(p.orderTime);
    if (p.specialNotes) setSpecialNotes(p.specialNotes);
    if (p.items?.length > 0) { setItems(p.items); setChecked(p.items.map(()=>false)); }
    setStep(1);
  };

  const addItem = (label) => { setItems(p=>[...p,label]); setChecked(p=>[...p,false]); };
  const removeItem = (i) => { setItems(p=>p.filter((_,j)=>j!==i)); setChecked(p=>p.filter((_,j)=>j!==i)); };
  const toggleCheck = (i) => setChecked(p=>p.map((v,j)=>j===i?!v:v));
  const addInteraction = (note) => setInteractions(p=>[...p,{note,time:timeNow()}]);
  const allChecked = items.length > 0 && checked.every(Boolean);

  const finish = () => onSave({ id: uid(), roomNumber, guestName, orderTaker, guestCount, dueTime, orderTime, items, delivered: true, interactions, specialNotes, createdAt: new Date().toISOString(), deliveredAt: new Date().toISOString() });

  const AllergyBanner = () => specialNotes ? <div style={S.cardWarn}><div style={{ fontSize: 11, color: "#C9A84C", fontWeight: 700 }}>⚠️ SPECIAL PREP / ALLERGY</div><div style={{ fontSize: 13 }}>{specialNotes}</div></div> : null;

  return <div style={S.sec}>
    <div style={{ display: "flex", gap: 3, marginBottom: 12 }}>
      {STEPS.map((s,i) => <div key={s} style={{ flex: 1, height: 3, borderRadius: 2, background: i<=step?"#C9A84C":"#1E3352" }} />)}
    </div>
    <div style={{ fontSize: 11, color: "#7A9BBF", marginBottom: 14, textTransform: "uppercase", letterSpacing: "0.06em" }}>
      Step {step+1}/{STEPS.length} — {STEPS[step]}
    </div>

    {step===0 && <PhotoScanner onExtracted={applyExtracted} onSkip={()=>setStep(1)} />}

    {step===1 && <div>
      <h2 style={{ margin:"0 0 14px", fontSize:20 }}>🛎 Order Details</h2>
      <div style={{ display:"flex", gap:8, marginBottom:10 }}>
        <div style={{ flex:1 }}>
          <label style={S.lbl}>Room Number *</label>
          <input style={{ ...S.inp, fontSize:22, fontWeight:700 }} placeholder="619" value={roomNumber} onChange={e=>setRoomNumber(e.target.value)} inputMode="numeric" />
        </div>
        <div style={{ width:70 }}>
          <label style={S.lbl}>Guests</label>
          <input style={{ ...S.inp, fontSize:18, textAlign:"center" }} placeholder="2" value={guestCount} onChange={e=>setGuestCount(e.target.value)} inputMode="numeric" />
        </div>
      </div>
      <label style={S.lbl}>Guest Last Name</label>
      <input style={{ ...S.inp, marginBottom:10 }} placeholder="e.g. Aileen" value={guestName} onChange={e=>setGuestName(e.target.value)} />
      <label style={S.lbl}>Order Taken By</label>
      <input style={{ ...S.inp, marginBottom:10 }} placeholder="e.g. Kailah" value={orderTaker} onChange={e=>setOrderTaker(e.target.value)} />
      <div style={{ display:"flex", gap:8, marginBottom:10 }}>
        <div style={{ flex:1 }}><label style={S.lbl}>Order Time</label><input style={S.inp} type="time" value={orderTime} onChange={e=>setOrderTime(e.target.value)} /></div>
        <div style={{ flex:1 }}><label style={S.lbl}>Deliver By</label><input style={S.inp} type="time" value={dueTime} onChange={e=>setDueTime(e.target.value)} /></div>
      </div>
      <label style={S.lbl}>Special Notes / Allergies</label>
      <input style={{ ...S.inp, marginBottom:8 }} placeholder="e.g. Peanuts/Almonds allergy" value={specialNotes} onChange={e=>setSpecialNotes(e.target.value)} />
      <AllergyBanner />
      <button style={S.btnB()} onClick={()=>roomNumber.trim()&&setStep(2)} disabled={!roomNumber.trim()}>Next: Add Items →</button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(0)}>← Retake Photo</button>
      <button style={S.btnB("ghost")} onClick={onCancel}>Cancel</button>
    </div>}

    {step===2 && <div>
      <h2 style={{ margin:"0 0 4px", fontSize:20 }}>🍽 Order Items</h2>
      <p style={{ color:"#7A9BBF", fontSize:13, marginBottom:10 }}>Tap any item to add it to the order.</p>
      <AllergyBanner />
      {items.length > 0 && <div style={{ ...S.card, marginBottom:10 }}>
        <div style={{ fontSize:11, color:"#7A9BBF", fontWeight:700, marginBottom:6 }}>ORDER ({items.length} item{items.length>1?"s":""})</div>
        {items.map((item,i) => <div key={i} style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid #1E335244", gap:8 }}>
          <span style={{ fontSize:13, flex:1 }}>• {item}</span>
          <button style={{ background:"none", border:"none", color:"#D94F3D", cursor:"pointer", fontSize:15, flexShrink:0 }} onClick={()=>removeItem(i)}>✕</button>
        </div>)}
      </div>}
      <MenuPicker onAdd={addItem} />
      <div style={S.div} />
      <label style={S.lbl}>Or type manually</label>
      <div style={{ display:"flex", gap:8 }}>
        <input style={{ ...S.inp, flex:1, fontSize:13 }} placeholder="Custom item…" value={manualItem} onChange={e=>setManualItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(setItems(p=>[...p,manualItem.trim()]),setChecked(p=>[...p,false]),setManualItem(""))} />
        <button style={S.btn("sec")} onClick={()=>{ if(manualItem.trim()){ addItem(manualItem.trim()); setManualItem(""); }}}>Add</button>
      </div>
      <button style={S.btnB()} onClick={()=>items.length>0&&setStep(3)} disabled={items.length===0}>Next: Checklist →</button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(1)}>← Back</button>
    </div>}

    {step===3 && <div>
      <h2 style={{ margin:"0 0 4px", fontSize:20 }}>🧾 Table Checklist</h2>
      <p style={{ color:"#7A9BBF", fontSize:13, marginBottom:10 }}>Confirm everything is on the table before you leave.</p>
      <AllergyBanner />
      <div style={{ fontSize:11, color:"#7A9BBF", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em", margin:"8px 0 4px" }}>🍽 Order Items</div>
      <Checklist items={items} checked={checked} onToggle={toggleCheck} />
      <TableSetupChecklist items={items} guestCount={parseInt(guestCount)||1} />
      {!allChecked && <div style={{ color:"#D94F3D", fontSize:12, marginTop:8 }}>⚠️ Check off all items before proceeding.</div>}
      <div style={S.div} />
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"#0A1320", borderRadius:10, padding:"12px 14px", marginBottom:8 }}>
        <div><div style={{ fontWeight:700, fontSize:15 }}>🔥 Fire Status</div><div style={{ fontSize:12, color:"#7A9BBF" }}>Must be OFF before delivery</div></div>
        <div style={{ textAlign:"center", cursor:"pointer" }} onClick={()=>setFireOn(f=>!f)}>
          <span style={S.fire(fireOn)}>🔥</span>
          <div style={{ fontSize:11, fontWeight:700, color:fireOn?"#D94F3D":"#2E8B6A" }}>{fireOn?"ON":"OFF"}</div>
        </div>
      </div>
      {fireOn && <div style={{ color:"#D94F3D", fontSize:12, background:"#1F0E0C", borderRadius:8, padding:"8px 12px", marginBottom:8 }}>🔥 Turn off fire before ringing the guest!</div>}
      <button style={S.btnB(allChecked&&!fireOn?"ok":"sec")} onClick={()=>allChecked&&!fireOn&&setStep(4)} disabled={!allChecked||fireOn}>
        {!allChecked?"Check all items first":fireOn?"Turn off fire first!":"Proceed to Delivery →"}
      </button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(2)}>← Back</button>
    </div>}

    {step===4 && <div>
      <h2 style={{ margin:"0 0 4px", fontSize:20 }}>🚪 At the Door</h2>
      <p style={{ color:"#7A9BBF", fontSize:13, marginBottom:12 }}>Re-check landing order. Log any guest interactions.</p>
      <div style={S.card}>
        <div style={{ fontWeight:700, marginBottom:4 }}>Room {roomNumber}{guestName?` · ${guestName}`:""}  {guestCount?`· ${guestCount} guests`:""}</div>
        {orderTaker && <div style={{ fontSize:12, color:"#7A9BBF", marginBottom:6 }}>Order by: {orderTaker}</div>}
        {specialNotes && <div style={{ fontSize:12, color:"#C9A84C", marginBottom:8 }}>⚠️ {specialNotes}</div>}
        {items.map((item,i) => <div key={i} style={{ fontSize:13, padding:"2px 0" }}>✅ {item}</div>)}
      </div>
      <label style={{ ...S.lbl, marginTop:8 }}>Guest Interactions</label>
      <InteractionLog interactions={interactions} onAdd={addInteraction} />
      <button style={S.btnB("ok")} onClick={()=>setStep(5)}>Mark as Delivered ✓</button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(3)}>← Back</button>
    </div>}

    {step===5 && <div style={{ textAlign:"center", padding:"24px 0" }}>
      <div style={{ fontSize:56, marginBottom:10 }}>✅</div>
      <h2 style={{ margin:"0 0 6px", fontSize:22 }}>Order Delivered!</h2>
      <div style={{ color:"#7A9BBF", marginBottom:4 }}>Room {roomNumber} · {timeNow()}</div>
      {dueTime && <div style={{ color:"#2E8B6A", fontSize:13 }}>Promised by {dueTime}</div>}
      <div style={{ ...S.card, textAlign:"left", marginTop:16 }}>
        {guestName && <div style={{ fontSize:12, color:"#7A9BBF" }}>Guest: {guestName}</div>}
        {orderTaker && <div style={{ fontSize:12, color:"#7A9BBF", marginBottom:6 }}>Taken by: {orderTaker}</div>}
        {items.map((item,i) => <div key={i} style={{ fontSize:13, padding:"2px 0" }}>• {item}</div>)}
        {specialNotes && <div style={{ fontSize:12, color:"#C9A84C", marginTop:6 }}>⚠️ {specialNotes}</div>}
      </div>
      <button style={S.btnB("ok")} onClick={finish}>Save & Finish</button>
    </div>}
  </div>;
}

// ─── ACTIVE ORDER CARD ────────────────────────────────────────────────────────
function ActiveOrderCard({ order, onUpdate }) {
  const [expanded, setExpanded] = useState(false);
  const [interactions, setInteractions] = useState(order.interactions || []);
  const addInteraction = (note) => { const u=[...interactions,{note,time:timeNow()}]; setInteractions(u); onUpdate({...order,interactions:u}); };
  const isLate = order.dueTime && !order.delivered && (() => {
    const [h,m] = order.dueTime.split(":").map(Number);
    const due = new Date(); due.setHours(h,m,0,0);
    return new Date() > due;
  })();
  return (
    <div style={isLate ? S.cardHot : S.card}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", cursor:"pointer" }} onClick={()=>setExpanded(e=>!e)}>
        <div>
          <div style={{ fontWeight:700, fontSize:18 }}>Room {order.roomNumber}{order.guestName?` · ${order.guestName}`:""}</div>
          {order.orderTaker && <div style={{ fontSize:11, color:"#4A6580" }}>by {order.orderTaker}</div>}
          <div style={{ fontSize:12, color:"#7A9BBF", marginTop:2 }}>{order.items.length} items{order.dueTime?` · Due ${order.dueTime}`:""}{order.guestCount?` · ${order.guestCount} guests`:""}</div>
        </div>
        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
          {isLate && <span style={S.tag("#D94F3D")}>LATE</span>}
          {order.specialNotes && <span style={S.tag("#C9A84C")}>⚠️</span>}
          <span style={{ color:"#4A6580" }}>{expanded?"▲":"▼"}</span>
        </div>
      </div>
      {expanded && <div style={{ marginTop:12 }}>
        {order.specialNotes && <div style={S.cardWarn}><div style={{ fontSize:11, color:"#C9A84C", fontWeight:700 }}>⚠️ SPECIAL PREP</div><div style={{ fontSize:13 }}>{order.specialNotes}</div></div>}
        {order.items.map((item,i) => <div key={i} style={{ fontSize:13, padding:"2px 0" }}>• {item}</div>)}
        <div style={S.div} />
        <InteractionLog interactions={interactions} onAdd={addInteraction} />
      </div>}
    </div>
  );
}

function OrdersTab({ data, setData }) {
  const [creating, setCreating] = useState(false);
  const active = data.orders.filter(o => !o.delivered);
  const saveOrder = (order) => { setData(d=>{ const nd={...d,orders:[order,...d.orders]}; saveData(nd); return nd; }); setCreating(false); };
  const updateOrder = (u) => { setData(d=>{ const nd={...d,orders:d.orders.map(o=>o.id===u.id?u:o)}; saveData(nd); return nd; }); };
  if (creating) return <NewOrder onSave={saveOrder} onCancel={()=>setCreating(false)} />;
  return <div style={S.sec}>
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
      <h2 style={{ margin:0, fontSize:20 }}>🛎 Active Orders</h2>
      <button style={S.btn()} onClick={()=>setCreating(true)}>+ New Order</button>
    </div>
    {active.length===0
      ? <div style={S.empty}><div style={{ fontSize:40 }}>🍽</div><div>No active orders</div><div style={{ fontSize:12, marginTop:4 }}>Tap + New Order to start</div></div>
      : active.map(o=><ActiveOrderCard key={o.id} order={o} onUpdate={updateOrder} />)}
  </div>;
}

// ─── AMENITIES TAB ────────────────────────────────────────────────────────────
function AmenityCard({ amenity, onUpdate }) {
  const [expanded, setExpanded] = useState(false);
  const [interactions, setInteractions] = useState(amenity.interactions||[]);
  const [checked, setChecked] = useState(amenity.items.map(()=>false));
  const addInteraction = (note) => { const u=[...interactions,{note,time:timeNow()}]; setInteractions(u); onUpdate({...amenity,interactions:u}); };
  return <div style={S.card}>
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", cursor:"pointer" }} onClick={()=>setExpanded(e=>!e)}>
      <div>
        <div style={{ fontWeight:700, fontSize:18 }}>Room {amenity.roomNumber}</div>
        <div style={{ fontSize:12, color:"#7A9BBF" }}>{amenity.items.length} items</div>
      </div>
      <div style={{ display:"flex", gap:6, alignItems:"center" }}>
        {amenity.dnd && <span style={S.tag("#7A9BBF")}>DND</span>}
        {amenity.delivered && <span style={S.tag("#2E8B6A")}>✓ Done</span>}
        <span style={{ color:"#4A6580" }}>{expanded?"▲":"▼"}</span>
      </div>
    </div>
    {expanded && <div style={{ marginTop:12 }}>
      <Checklist items={amenity.items} checked={checked} onToggle={(i)=>setChecked(p=>p.map((v,j)=>j===i?!v:v))} />
      <div style={S.div} />
      <div style={{ display:"flex", gap:8, marginBottom:8 }}>
        <button style={{ ...S.btn("ok"), flex:1 }} onClick={()=>onUpdate({...amenity,delivered:true})}>✓ Delivered</button>
        <button style={{ ...S.btn("sec"), flex:1 }} onClick={()=>onUpdate({...amenity,dnd:true})}>🚫 DND</button>
      </div>
      <InteractionLog interactions={interactions} onAdd={addInteraction} />
    </div>}
  </div>;
}

function AmenitiesTab({ data, setData }) {
  const [adding, setAdding] = useState(false);
  const [roomInput, setRoomInput] = useState("");
  const [itemInput, setItemInput] = useState("");
  const [items, setItems] = useState([]);
  const addItem = () => { if (itemInput.trim()) { setItems(p=>[...p,itemInput.trim()]); setItemInput(""); } };
  const saveAmenity = () => {
    if (!roomInput.trim()||items.length===0) return;
    const a={id:uid(),roomNumber:roomInput,items,delivered:false,dnd:false,interactions:[],createdAt:new Date().toISOString()};
    setData(d=>{ const nd={...d,amenities:[a,...d.amenities]}; saveData(nd); return nd; });
    setRoomInput(""); setItems([]); setAdding(false);
  };
  const updateAmenity = (u) => { setData(d=>{ const nd={...d,amenities:d.amenities.map(a=>a.id===u.id?u:a)}; saveData(nd); return nd; }); };
  const active = data.amenities.filter(a=>!a.delivered&&!a.dnd);
  return <div style={S.sec}>
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
      <h2 style={{ margin:0, fontSize:20 }}>🎁 Amenities</h2>
      <button style={S.btn()} onClick={()=>setAdding(a=>!a)}>{adding?"Cancel":"+ New"}</button>
    </div>
    {adding && <div style={{ ...S.card, marginBottom:16 }}>
      <label style={S.lbl}>Room Number</label>
      <input style={{ ...S.inp, marginBottom:10, fontSize:20, fontWeight:700 }} placeholder="508" value={roomInput} onChange={e=>setRoomInput(e.target.value)} inputMode="numeric" />
      <label style={S.lbl}>Add Items</label>
      <div style={{ display:"flex", gap:8, marginBottom:8 }}>
        <input style={{ ...S.inp, flex:1 }} placeholder="e.g. Champagne, Strawberries" value={itemInput} onChange={e=>setItemInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} />
        <button style={S.btn()} onClick={addItem}>Add</button>
      </div>
      {items.map((item,i) => <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", fontSize:13 }}>
        <span>• {item}</span>
        <button style={{ background:"none", border:"none", color:"#D94F3D", cursor:"pointer" }} onClick={()=>setItems(p=>p.filter((_,j)=>j!==i))}>✕</button>
      </div>)}
      <button style={S.btnB("ok")} onClick={saveAmenity} disabled={!roomInput.trim()||items.length===0}>Save Amenity Run</button>
    </div>}
    {active.length===0&&!adding
      ? <div style={S.empty}><div style={{ fontSize:40 }}>🎁</div><div>No active amenities</div></div>
      : active.map(a=><AmenityCard key={a.id} amenity={a} onUpdate={updateAmenity} />)}
  </div>;
}

// ─── RECORDS TAB ─────────────────────────────────────────────────────────────
function RecordsTab({ data }) {
  const [tab, setTab] = useState("orders");
  return <div style={S.sec}>
    <h2 style={{ margin:"0 0 12px", fontSize:20 }}>📋 Records</h2>
    <div style={{ display:"flex", gap:6, marginBottom:16 }}>
      {["orders","amenities"].map(t=>(
        <button key={t} style={{ ...S.btn(tab===t?"pri":"sec"), flex:1, padding:"9px 4px", fontSize:13, textTransform:"capitalize" }} onClick={()=>setTab(t)}>{t}</button>
      ))}
    </div>
    {tab==="orders" && (data.orders.length===0
      ? <div style={S.empty}><div style={{ fontSize:40 }}>📋</div><div>No orders yet</div></div>
      : data.orders.map(o=><div key={o.id} style={S.card}>
        <div style={{ display:"flex", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontWeight:700 }}>Room {o.roomNumber}{o.guestName?` · ${o.guestName}`:""}</div>
            {o.orderTaker && <div style={{ fontSize:11, color:"#4A6580" }}>by {o.orderTaker}</div>}
            <div style={{ fontSize:12, color:"#7A9BBF" }}>{fmtDate(o.createdAt)} {fmtTime(o.createdAt)}</div>
          </div>
          <span style={S.tag(o.delivered?"#2E8B6A":"#C9A84C")}>{o.delivered?"Delivered":"Active"}</span>

          {o.specialNotes && <div style={{ fontSize:12, color:"#C9A84C", marginTop:4 }}>⚠️ {o.specialNotes}</div>}
        </div>
        {o.interactions?.length>0 && <div style={{ marginTop:8 }}>{o.interactions.map((n,i)=><div key={i} style={{ fontSize:11, color:"#4A6580" }}>{n.time} — {n.note}</div>)}</div>}
      </div>)
    )}
    {tab==="amenities" && (data.amenities.length===0
      ? <div style={S.empty}><div style={{ fontSize:40 }}>🎁</div><div>No amenities yet</div></div>
      : data.amenities.map(a=><div key={a.id} style={S.card}>
        <div style={{ display:"flex", justifyContent:"space-between" }}>
          <div><div style={{ fontWeight:700 }}>Room {a.roomNumber}</div><div style={{ fontSize:12, color:"#7A9BBF" }}>{fmtDate(a.createdAt)}</div></div>
          <span style={S.tag(a.delivered?"#2E8B6A":a.dnd?"#7A9BBF":"#C9A84C")}>{a.delivered?"✓ Done":a.dnd?"DND":"Pending"}</span>
        </div>
        <div style={{ marginTop:6 }}>{a.items.map((item,i)=><div key={i} style={{ fontSize:12, color:"#7A9BBF" }}>• {item}</div>)}</div>
      </div>)
    )}
  </div>;
}

// Flat list of every item across all menus for instant search
const ALL_ITEMS = Object.entries(MENUS).flatMap(([menuName, categories]) =>
  categories.flatMap(cat =>
    cat.items.map(item => ({ ...item, menuName, category: cat.category }))
  )
);

function MenuTab() {
  const [search, setSearch] = useState("");
  const [activeMenu, setActiveMenu] = useState("All");
  const [activeCat, setActiveCat] = useState(null);
  const [expanded, setExpanded] = useState(null);

  const menuNames = ["All", ...Object.keys(MENUS)];
  const query = search.toLowerCase().trim();

  // Filter by menu first
  const byMenu = activeMenu === "All" ? ALL_ITEMS : ALL_ITEMS.filter(i => i.menuName === activeMenu);

  // Then by category pill (only when no search active)
  const categories = [...new Set(byMenu.map(i => i.category))];

  // Then apply search or category filter
  const results = query
    ? byMenu.filter(i =>
        i.name.toLowerCase().includes(query) ||
        (i.note || "").toLowerCase().includes(query) ||
        i.category.toLowerCase().includes(query) ||
        (i.tags || []).some(t => t.toLowerCase().includes(query))
      )
    : activeCat
      ? byMenu.filter(i => i.category === activeCat)
      : byMenu;

  const toggleExpand = (key) => setExpanded(e => e === key ? null : key);

  return (
    <div style={S.sec}>
      <h2 style={{ margin: "0 0 14px", fontSize: 20 }}>🔎 Menu Lookup</h2>

      {/* Search bar */}
      <div style={{ position: "relative", marginBottom: 10 }}>
        <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 15 }}>🔍</span>
        <input
          style={{ ...S.inp, paddingLeft: 36, fontSize: 15 }}
          placeholder="Search any item, ingredient, tag…"
          value={search}
          onChange={e => { setSearch(e.target.value); setActiveCat(null); }}
          autoFocus={false}
        />
        {search && (
          <button onClick={() => setSearch("")} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#7A9BBF", cursor: "pointer", fontSize: 18 }}>✕</button>
        )}
      </div>

      {/* Menu type pills */}
      <div style={{ display: "flex", gap: 5, overflowX: "auto", paddingBottom: 6, marginBottom: 6 }}>
        {menuNames.map(m => (
          <button key={m} onClick={() => { setActiveMenu(m); setActiveCat(null); setSearch(""); }}
            style={{ padding: "5px 11px", borderRadius: 20, border: `1px solid ${activeMenu === m ? "#C9A84C" : "#1E3352"}`, background: activeMenu === m ? "#C9A84C22" : "#0F1B2D", color: activeMenu === m ? "#C9A84C" : "#7A9BBF", cursor: "pointer", fontSize: 12, whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 4 }}>
            {MENU_ICONS[m] && <span>{MENU_ICONS[m]}</span>}<span>{m}</span>
          </button>
        ))}
      </div>

      {/* Category pills — only show when no search active */}
      {!search && (
        <div style={{ display: "flex", gap: 5, overflowX: "auto", paddingBottom: 6, marginBottom: 8 }}>
          <button onClick={() => setActiveCat(null)} style={{ padding: "4px 10px", borderRadius: 20, border: `1px solid ${!activeCat ? "#C9A84C" : "#1E3352"}`, background: !activeCat ? "#C9A84C22" : "#0F1B2D", color: !activeCat ? "#C9A84C" : "#4A6580", cursor: "pointer", fontSize: 11, whiteSpace: "nowrap" }}>All</button>
          {categories.map(cat => (
            <button key={cat} onClick={() => setActiveCat(cat === activeCat ? null : cat)}
              style={{ padding: "4px 10px", borderRadius: 20, border: `1px solid ${activeCat === cat ? "#C9A84C" : "#1E3352"}`, background: activeCat === cat ? "#C9A84C22" : "#0F1B2D", color: activeCat === cat ? "#C9A84C" : "#4A6580", cursor: "pointer", fontSize: 11, whiteSpace: "nowrap" }}>
              {cat}
            </button>
          ))}
        </div>
      )}

      {/* Result count */}
      <div style={{ fontSize: 11, color: "#4A6580", marginBottom: 10 }}>
        {query ? `${results.length} result${results.length !== 1 ? "s" : ""} for "${query}"` : `${results.length} items`}
      </div>

      {/* Results */}
      {results.length === 0 && (
        <div style={S.empty}>
          <div style={{ fontSize: 36 }}>🍽</div>
          <div>No items found</div>
          <div style={{ fontSize: 12, marginTop: 4 }}>Try a different search</div>
        </div>
      )}

      <div>
        {results.map((item, idx) => {
          const key = `${item.menuName}-${item.name}-${idx}`;
          const isOpen = expanded === key;
          return (
            <div key={key} style={{ ...S.card, padding: 0, overflow: "hidden", marginBottom: 8 }}>
              {/* Item row */}
              <div onClick={() => toggleExpand(key)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", cursor: "pointer" }}>
                <div style={{ flex: 1, paddingRight: 10 }}>
                  <div style={{ fontWeight: 600, fontSize: 15 }}>{item.name}</div>
                  <div style={{ display: "flex", gap: 5, marginTop: 3, flexWrap: "wrap", alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: "#4A6580" }}>{MENU_ICONS[item.menuName]} {item.menuName}</span>
                    <span style={{ fontSize: 11, color: "#1E3352" }}>·</span>
                    <span style={{ fontSize: 11, color: "#4A6580" }}>{item.category}</span>
                    {(item.tags || []).map(t => <DietTag key={t} tag={t} />)}
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                  <span style={{ fontSize: 16, fontWeight: 700, color: "#C9A84C" }}>${item.price}</span>
                  <span style={{ fontSize: 14, color: "#4A6580" }}>{isOpen ? "▲" : "▼"}</span>
                </div>
              </div>

              {/* Expanded detail */}
              {isOpen && (
                <div style={{ borderTop: "1px solid #1E3352", padding: "12px 14px", background: "#0F1B2D" }}>
                  {item.note && (
                    <div style={{ marginBottom: 10 }}>
                      <div style={{ fontSize: 11, color: "#7A9BBF", fontWeight: 700, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.05em" }}>Description</div>
                      <div style={{ fontSize: 13, color: "#F7F4EF", lineHeight: 1.5 }}>{item.note}</div>
                    </div>
                  )}
                  {item.options && item.options.length > 0 && (
                    <div>
                      <div style={{ fontSize: 11, color: "#7A9BBF", fontWeight: 700, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>Options</div>
                      {item.options.map(opt => (
                        <div key={opt.label} style={{ marginBottom: 6 }}>
                          <span style={{ fontSize: 12, color: "#C9A84C", fontWeight: 600 }}>{opt.label}: </span>
                          <span style={{ fontSize: 12, color: "#7A9BBF" }}>{opt.choices.join(", ")}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #1E335244", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontSize: 12, color: "#4A6580" }}>
                      +17% service · +3.5% admin · +$7 delivery
                    </div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: "#C9A84C" }}>${item.price}</div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

const APP_VERSION = "1.4.8";
const APP_UPDATED = "Jun 18, 2026";

// ─── SETTINGS TAB ─────────────────────────────────────────────────────────────
function SettingsTab({ data, setData }) {
  const [installPrompt, setInstallPrompt] = useState(null);
  const [installed, setInstalled] = useState(false);
  const [platform, setPlatform] = useState("unknown");
  const [showClearConfirm, setShowClearConfirm] = useState(false);
  const [cleared, setCleared] = useState(false);
  const [updateAvailable, setUpdateAvailable] = useState(false);
  const [iosSeparateStorage, setIosSeparateStorage] = useState(false);
  const [storageAge, setStorageAge] = useState(null);
  const [iosVersion, setIosVersion] = useState(null);
  const [online, setOnline] = useState(navigator.onLine);

  useEffect(() => {
    const ua = navigator.userAgent.toLowerCase();
    const isIos = /iphone|ipad|ipod/.test(ua);
    const isAndroid = /android/.test(ua);
    const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
    setPlatform(isIos ? "ios" : isAndroid ? "android" : "desktop");
    if (isStandalone) setInstalled(true);

    // ── FIX #2: Detect iOS separate storage ─────────────────────────────────
    if (isIos) {
      // Detect iOS version
      const match = ua.match(/os (\d+)_(\d+)/);
      if (match) {
        const major = parseInt(match[1]);
        setIosVersion(major);
        // iOS PWA uses separate storage from Safari browser
        // Warn if they're in browser (not standalone) with existing data
        if (!isStandalone && (data.orders.length > 0 || data.amenities.length > 0)) {
          setIosSeparateStorage(true);
        }
      }
    }

    // ── FIX #3: Check storage age ────────────────────────────────────────────
    try {
      const saved = localStorage.getItem("rs_last_active");
      if (saved) {
        const days = Math.floor((Date.now() - parseInt(saved)) / (1000 * 60 * 60 * 24));
        setStorageAge(days);
      }
      // Update last active timestamp
      localStorage.setItem("rs_last_active", Date.now().toString());
    } catch {}

    // ── FIX #4: Camera permission ─────────────────────────────────────────────
    // Handled by file input approach — no additional code needed

    // ── FIX #5: SW update check ───────────────────────────────────────────────
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.ready.then(reg => {
        reg.update().then(() => {
          if (reg.waiting) setUpdateAvailable(true);
        });
        // Listen for new SW waiting
        reg.addEventListener("updatefound", () => {
          const newWorker = reg.installing;
          if (newWorker) {
            newWorker.addEventListener("statechange", () => {
              if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                setUpdateAvailable(true);
              }
            });
          }
        });
      }).catch(() => {});
    }

    // Online/offline listener
    const onOnline = () => setOnline(true);
    const onOffline = () => setOnline(false);
    window.addEventListener("online", onOnline);
    window.addEventListener("offline", onOffline);

    // Android install prompt
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      setInstallPrompt(e);
    });
    window.addEventListener("appinstalled", () => setInstalled(true));
  }, []);

  const triggerInstall = async () => {
    if (installPrompt) {
      installPrompt.prompt();
      const result = await installPrompt.userChoice;
      if (result.outcome === "accepted") setInstalled(true);
    }
  };

  const applyUpdate = () => {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.ready.then(reg => {
        if (reg.waiting) {
          reg.waiting.postMessage({ type: "SKIP_WAITING" });
          window.location.reload();
        } else {
          window.location.reload();
        }
      });
    } else {
      window.location.reload();
    }
  };

  const clearData = () => {
    setData(defaultState());
    saveData(defaultState());
    setCleared(true);
    setShowClearConfirm(false);
  };

  const orderCount = data.orders.length;
  const amenityCount = data.amenities.length;
  const isIos = platform === "ios";
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;

  return (
    <div style={S.sec}>
      <h2 style={{ margin: "0 0 16px", fontSize: 20 }}>⚙️ Settings</h2>

      {/* ── FIX #5: Update Available Banner ────────────────────────────────── */}
      {updateAvailable && (
        <div style={{ background: "#0C1F0F", border: "1px solid #2E8B6A", borderRadius: 12, padding: 14, marginBottom: 12, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
          <div>
            <div style={{ fontWeight: 700, color: "#2E8B6A", fontSize: 14 }}>🆕 Update Available</div>
            <div style={{ fontSize: 12, color: "#7A9BBF" }}>New version ready — tap to apply</div>
          </div>
          <button style={{ ...S.btn("ok"), padding: "8px 14px", fontSize: 13 }} onClick={applyUpdate}>Update Now</button>
        </div>
      )}

      {/* ── FIX #1: API Error helper (shown in offline/blocked state) ───────── */}
      {!online && (
        <div style={{ background: "#1F0E0C", border: "1px solid #8B2E25", borderRadius: 12, padding: 14, marginBottom: 12 }}>
          <div style={{ fontWeight: 700, color: "#D94F3D", fontSize: 14, marginBottom: 4 }}>📵 You're Offline</div>
          <div style={{ fontSize: 12, color: "#7A9BBF" }}>Photo scanning requires internet. Menu browsing and manual entry still work.</div>
        </div>
      )}

      {/* ── FIX #2: iOS Separate Storage Warning ────────────────────────────── */}
      {isIos && !isStandalone && (
        <div style={{ background: "#1A1500", border: "1px solid #6B4A00", borderRadius: 12, padding: 14, marginBottom: 12 }}>
          <div style={{ fontWeight: 700, color: "#C9A84C", fontSize: 14, marginBottom: 4 }}>⚠️ iPhone: Install for Persistent Data</div>
          <div style={{ fontSize: 12, color: "#7A9BBF", marginBottom: 8 }}>
            Safari and the installed app use <strong style={{ color: "#F7F4EF" }}>separate storage</strong>. Orders saved in Safari won't appear in the installed app and vice versa. Install the app and always use it from your home screen.
          </div>
          <div style={{ fontSize: 11, color: "#4A6580" }}>
            Tap Share → Add to Home Screen → always open from there
          </div>
        </div>
      )}

      {/* ── FIX #3: Storage Age Warning ─────────────────────────────────────── */}
      {storageAge !== null && storageAge >= 5 && (
        <div style={{ background: storageAge >= 7 ? "#1F0E0C" : "#1A1500", border: `1px solid ${storageAge >= 7 ? "#8B2E25" : "#6B4A00"}`, borderRadius: 12, padding: 14, marginBottom: 12 }}>
          <div style={{ fontWeight: 700, color: storageAge >= 7 ? "#D94F3D" : "#C9A84C", fontSize: 14, marginBottom: 4 }}>
            {storageAge >= 7 ? "🚨 Data May Be Lost" : "⚠️ Data Expiry Warning"}
          </div>
          <div style={{ fontSize: 12, color: "#7A9BBF" }}>
            {storageAge >= 7
              ? `Safari hasn't been active for ${storageAge} days. iOS may have already cleared your stored data.`
              : `Your data hasn't been accessed in ${storageAge} days. Safari clears data after 7 days of inactivity on iPhone.`}
          </div>
          {storageAge >= 7 && <div style={{ fontSize: 11, color: "#D94F3D", marginTop: 6 }}>Install as app to avoid this — PWA storage is more persistent.</div>}
        </div>
      )}

      {/* Install as App */}
      <div style={{ ...S.card, marginBottom: 10 }}>
        <div style={{ fontSize: 13, color: "#7A9BBF", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>📲 Install as App</div>
        {installed ? (
          <div style={{ display: "flex", alignItems: "center", gap: 12, background: "#0C1F0F", border: "1px solid #2E8B6A", borderRadius: 10, padding: 14 }}>
            <span style={{ fontSize: 32 }}>✅</span>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15, color: "#2E8B6A" }}>App Installed!</div>
              <div style={{ fontSize: 12, color: "#7A9BBF" }}>Running as a home screen app</div>
            </div>
          </div>
        ) : installPrompt ? (
          <button style={{ ...S.btnB(), marginTop: 0, fontSize: 16, padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }} onClick={triggerInstall}>
            <span style={{ fontSize: 24 }}>📲</span>
            <span>Install App on Home Screen</span>
          </button>
        ) : isIos ? (
          <div style={{ background: "#0A1320", borderRadius: 10, padding: 14, textAlign: "center" }}>
            <div style={{ fontSize: 13, color: "#7A9BBF", marginBottom: 10 }}>In <strong style={{ color: "#F7F4EF" }}>Safari</strong>, tap:</div>
            <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 24 }}>⎋</span>
              <span style={{ color: "#C9A84C", fontWeight: 700 }}>Share → Add to Home Screen</span>
            </div>
            {iosVersion && iosVersion < 16 && (
              <div style={{ fontSize: 11, color: "#D94F3D", marginTop: 6 }}>
                ⚠️ iOS {iosVersion} detected — update to iOS 16+ for best PWA support

          </div>
        ) : platform === "android" ? (
          <div style={{ background: "#0A1320", borderRadius: 10, padding: 14, textAlign: "center" }}>
            <div style={{ fontSize: 13, color: "#7A9BBF", marginBottom: 8 }}>Tap the Chrome menu then:</div>
            <div style={{ color: "#C9A84C", fontWeight: 700, fontSize: 14 }}>⋮ → Add to Home screen</div>
            <div style={{ fontSize: 11, color: "#4A6580", marginTop: 8 }}>Or reload the page — the install button may appear</div>

        ) : (
          <div style={{ fontSize: 13, color: "#7A9BBF", textAlign: "center" }}>Open in Chrome (Android) or Safari (iPhone) to install</div>

      </div>

      {/* Offline status */}
      <div style={{ ...S.card, marginBottom: 10 }}>
        <div style={{ fontSize: 13, color: "#7A9BBF", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>🔌 Connection</div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>

      <div style={{ ...S.card, marginBottom: 10 }}>

        {showClearConfirm && (
          <div style={{ background: "#1F0E0C", border: "1px solid #8B2E25", borderRadius: 8, padding: 12 }}>
            <div style={{ fontSize: 13, color: "#F7F4EF", marginBottom: 10 }}>⚠️ This will permanently delete all orders and amenities. Cannot be undone.</div>

            </span>
          </div>
        )}
      </div>

      {/* Changelog */}
      <div style={{ ...S.card, marginBottom: 24 }}>
        <div style={{ fontSize: 13, color: "#7A9BBF", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>📝 Changelog</div>
        {[
          { v: "1.4.5", date: "Jun 17, 2026", notes: ["Fixed image resize for iPhone (dataUrl approach)", "Added HEIC/HEIF format detection", "Fixed all 5 iPhone-specific issues: ITP errors, separate storage warning, 7-day storage expiry alert, camera permissions, SW auto-update"] },
          { v: "1.4.4", date: "Jun 17, 2026", notes: ["Fixed image resize not running on Android (canvas from dataUrl)"] },

          { v: "1.4.1", date: "Jun 17, 2026", notes: ["Open/custom item table setup handling"] },
          { v: "1.4.0", date: "Jun 17, 2026", notes: ["Auto table setup checklist — calculates what goes on table based on items ordered"] },
          { v: "1.3.3", date: "Jun 16, 2026", notes: ["Split API key to bypass GitHub secret scanner"] },
          { v: "1.3.0", date: "Jun 16, 2026", notes: ["Added Settings tab, PWA offline support, image resize, improved ticket extraction"] },
          { v: "1.2.0", date: "Jun 16, 2026", notes: ["Full menu picker (8 menus), AI photo ticket scanner, Menu lookup tab"] },
          { v: "1.0.0", date: "Jun 16, 2026", notes: ["Initial release"] },
        ].map(entry => (
          <div key={entry.v} style={{ marginBottom: 12, paddingBottom: 12, borderBottom: "1px solid #1E3352" }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
              <span style={{ color: "#C9A84C", fontWeight: 700, fontSize: 13 }}>v{entry.v}</span>
              <span style={{ color: "#4A6580", fontSize: 11 }}>{entry.date}</span>
            </div>

              <div key={i} style={{ fontSize: 12, color: "#7A9BBF", padding: "1px 0" }}>• {note}</div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}


// ─── APP ROOT ─────────────────────────────────────────────────────────────────
const TABS = [
  { id:"orders", label:"Orders", icon:"🛎" },
  { id:"amenities", label:"Amenities", icon:"🎁" },
  { id:"menu", label:"Menu", icon:"🔎" },
  { id:"records", label:"Records", icon:"📋" },
  { id:"settings", label:"Settings", icon:"⚙️" },
];

function App() {
  const [activeTab, setActiveTab] = useState("orders");
  const [data, setData] = useState(() => loadData() || defaultState());
  const activeOrders = data.orders.filter(o=>!o.delivered);
  const pendingAmenities = data.amenities.filter(a=>!a.delivered&&!a.dnd);
  return <div style={S.app}>
    <div style={S.header}>
      <div>
        <div style={{ fontSize:18, fontWeight:700 }}>🏨 Room Service</div>
        <div style={{ fontSize:11, color:"#7A9BBF", marginTop:1 }}>{today()} · {activeOrders.length} active order{activeOrders.length!==1?"s":""}</div>
      </div>
      <div style={{ fontSize:12, color:"#4A6580", textAlign:"right" }}>
        <div>{pendingAmenities} pending amenity{pendingAmenities!==1?"s":""}</div>
        <div style={{ color:"#1E3352", fontSize:10 }}>v{APP_VERSION}</div>
      </div>
    </div>
    <div style={S.scroll}>
      {activeTab==="orders" && <OrdersTab data={data} setData={setData} />}
      {activeTab==="amenities" && <AmenitiesTab data={data} setData={setData} />}
      {activeTab==="menu" && <MenuTab />}
      {activeTab==="records" && <RecordsTab data={data} />}
      {activeTab==="settings" && <SettingsTab data={data} setData={setData} />}
    </div>
    <div style={S.nav}>
      {TABS.map(t => {
        const badge = t.id==="orders"?activeOrders.length:t.id==="amenities"?pendingAmenities.length:0;
        return <button key={t.id} style={S.navBtn(activeTab===t.id)} onClick={()=>setActiveTab(t.id)}>
          <div style={{ position:"relative", display:"inline-block" }}>
            <span style={{ fontSize:20 }}>{t.icon}</span>
            {badge>0 && <span style={S.badge(badge)}>{badge}</span>}
          </div>
          {t.label}
        </button>;
      })}
    </div>
  </div>;
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
