// ─── SHARED COMPONENTS ────────────────────────────────────────────────────────
function DietTag({ tag }) {
  const c = TAG_COLORS[tag] || "#888";
  return <span style={{ background: c+"22", color: c, border: `1px solid ${c}44`, borderRadius: 4, padding: "1px 5px", fontSize: 10, fontWeight: 700 }}>{tag}</span>;
}
function Checklist({ items, checked, onToggle }) {
  return <div>{items.map((item, i) => (
    <div key={i} onClick={() => onToggle(i)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 0", borderBottom: "1px solid #1E335244", cursor: "pointer" }}>
      <span style={{ fontSize: 18, color: checked[i]?"#2E8B6A":"#1E3352", flexShrink: 0 }}>{checked[i]?"✅":"⬜"}</span>
      <span style={{ fontSize: 14, color: checked[i]?"#7A9BBF":"#F7F4EF", textDecoration: checked[i]?"line-through":"none" }}>{item}</span>
    </div>
  ))}</div>;
}
function InteractionLog({ interactions, onAdd }) {
  const [note, setNote] = useState("");
  return <div>
    <div style={{ display: "flex", gap: 8, marginBottom: 6 }}>
      <input style={{ ...S.inp, flex: 1, fontSize: 13 }} placeholder="Log guest interaction…" value={note} onChange={e => setNote(e.target.value)} onKeyDown={e => { if (e.key==="Enter" && note.trim()) { onAdd(note.trim()); setNote(""); } }} />
      <button style={S.btn("sec")} onClick={() => { if (note.trim()) { onAdd(note.trim()); setNote(""); } }}>Add</button>
    </div>
    {interactions.map((n, i) => <div key={i} style={{ fontSize: 12, color: "#7A9BBF", padding: "4px 0", borderBottom: "1px solid #1E335244" }}><span style={{ color: "#C9A84C", marginRight: 6 }}>{n.time}</span>{n.note}</div>)}
  </div>;
}

// ─── OPTIONS MODAL ────────────────────────────────────────────────────────────
function OptionsModal({ menuItem, onConfirm, onClose }) {
  const [sel, setSel] = useState({});
  const [qty, setQty] = useState(1);
  const [prep, setPrep] = useState("");
  const opts = menuItem.options || [];
  const ready = opts.length === 0 || opts.every(o => sel[o.label]);
  const buildLabel = () => {
    const parts = opts.map(o => sel[o.label]).filter(Boolean);
    return `${qty > 1 ? qty+"x " : ""}${menuItem.name}${parts.length ? ` (${parts.join(", ")})` : ""}${prep.trim() ? ` — ${prep.trim()}` : ""}`;
  };
  return (
    <div style={{ position: "fixed", inset: 0, background: "#000b", zIndex: 200, display: "flex", alignItems: "flex-end" }}>
      <div style={{ background: "#152033", borderRadius: "16px 16px 0 0", width: "100%", maxWidth: 480, margin: "0 auto", padding: 20, maxHeight: "88vh", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 17 }}>{menuItem.name}</div>
            <div style={{ fontSize: 13, color: "#C9A84C", fontWeight: 600 }}>${menuItem.price}</div>
            {menuItem.note && <div style={{ fontSize: 12, color: "#4A6580", marginTop: 2 }}>{menuItem.note}</div>}
            <div style={{ display: "flex", gap: 4, marginTop: 4, flexWrap: "wrap" }}>{(menuItem.tags||[]).map(t => <DietTag key={t} tag={t} />)}</div>
          </div>
          <button style={{ background: "none", border: "none", color: "#7A9BBF", fontSize: 22, cursor: "pointer", alignSelf: "flex-start" }} onClick={onClose}>✕</button>
        </div>
        <label style={S.lbl}>Quantity</label>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
          <button style={{ ...S.btn("sec"), padding: "6px 18px", fontSize: 20 }} onClick={() => setQty(q => Math.max(1,q-1))}>−</button>
          <span style={{ fontSize: 22, fontWeight: 700, minWidth: 24, textAlign: "center" }}>{qty}</span>
          <button style={{ ...S.btn("sec"), padding: "6px 18px", fontSize: 20 }} onClick={() => setQty(q => q+1)}>+</button>
        </div>
        {opts.map(opt => (
          <div key={opt.label} style={{ marginBottom: 12 }}>
            <label style={S.lbl}>{opt.label}</label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {opt.choices.map(c => (
                <button key={c} onClick={() => setSel(s => ({ ...s, [opt.label]: c }))}
                  style={{ padding: "6px 12px", borderRadius: 8, border: `1px solid ${sel[opt.label]===c?"#C9A84C":"#1E3352"}`, background: sel[opt.label]===c?"#C9A84C22":"#0F1B2D", color: sel[opt.label]===c?"#C9A84C":"#F7F4EF", cursor: "pointer", fontSize: 13 }}>
                  {c}
                </button>
              ))}
            </div>
          </div>
        ))}
        <label style={S.lbl}>Special Prep Note</label>
        <input style={{ ...S.inp, marginBottom: 16 }} placeholder="e.g. Warmed, extra sauce, no onion…" value={prep} onChange={e => setPrep(e.target.value)} />
        <button style={S.btnB(ready?"ok":"sec")} onClick={() => ready && onConfirm(buildLabel(), qty)} disabled={!ready}>
          {ready ? "Add to Order" : "Select all options"}
        </button>
      </div>
    </div>
  );
}

  const [modal, setModal] = useState(null);
  const menuNames = Object.keys(MENUS);
  const query = search.toLowerCase();
  const categories = MENUS[activeMenu];

  const filtered = query
    ? categories.map(cat => ({ ...cat, items: cat.items.filter(i => i.name.toLowerCase().includes(query) || (i.note||"").toLowerCase().includes(query)) })).filter(c => c.items.length > 0)
    : categories.map(cat => ({ ...cat, items: !activeCat || activeCat === cat.category ? cat.items : [] }));

  const handleAdd = (label, qty) => { for (let i=0;i<qty;i++) onAdd(label); setModal(null); };

  return (
    <div>
      {modal && <OptionsModal menuItem={modal} onConfirm={handleAdd} onClose={() => setModal(null)} />}

      {/* Menu type selector */}
      <div style={{ display: "flex", gap: 4, overflowX: "auto", paddingBottom: 6, marginBottom: 8 }}>
        {menuNames.map(m => (
          <button key={m} onClick={() => { setActiveMenu(m); setActiveCat(null); setSearch(""); }}
            style={{ padding: "6px 10px", borderRadius: 20, border: `1px solid ${activeMenu===m?"#C9A84C":"#1E3352"}`, background: activeMenu===m?"#C9A84C22":"#0F1B2D", color: activeMenu===m?"#C9A84C":"#7A9BBF", cursor: "pointer", fontSize: 12, whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 4 }}>
            <span>{MENU_ICONS[m]}</span><span>{m}</span>
          </button>
        ))}
      </div>

      {/* Search */}
      <div style={{ position: "relative", marginBottom: 8 }}>
        <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 14 }}>🔍</span>
        <input style={{ ...S.inp, paddingLeft: 34, fontSize: 14 }} placeholder={`Search ${activeMenu}…`} value={search} onChange={e => { setSearch(e.target.value); setActiveCat(null); }} />
        {search && <button onClick={() => setSearch("")} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#7A9BBF", cursor: "pointer", fontSize: 16 }}>✕</button>}
      </div>

      {/* Category pills */}
      {!search && (
        <div style={{ display: "flex", gap: 5, overflowX: "auto", paddingBottom: 6, marginBottom: 4 }}>
          <button onClick={() => setActiveCat(null)} style={{ padding: "4px 10px", borderRadius: 20, border: `1px solid ${!activeCat?"#C9A84C":"#1E3352"}`, background: !activeCat?"#C9A84C22":"#0F1B2D", color: !activeCat?"#C9A84C":"#7A9BBF", cursor: "pointer", fontSize: 11, whiteSpace: "nowrap" }}>All</button>
          {categories.map(cat => (
            <button key={cat.category} onClick={() => setActiveCat(cat.category===activeCat?null:cat.category)} style={{ padding: "4px 10px", borderRadius: 20, border: `1px solid ${activeCat===cat.category?"#C9A84C":"#1E3352"}`, background: activeCat===cat.category?"#C9A84C22":"#0F1B2D", color: activeCat===cat.category?"#C9A84C":"#7A9BBF", cursor: "pointer", fontSize: 11, whiteSpace: "nowrap" }}>{cat.category}</button>
          ))}
        </div>
      )}

      {/* Items list */}
      <div style={{ maxHeight: 320, overflowY: "auto" }}>
        {filtered.map(cat => cat.items.length > 0 && (
          <div key={cat.category}>
            <div style={{ fontSize: 10, color: "#4A6580", fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", padding: "8px 0 4px" }}>{cat.category}</div>
            {cat.items.map(item => (
              <div key={item.name} onClick={() => setModal(item)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "9px 0", borderBottom: "1px solid #1E335244", cursor: "pointer" }}>
                <div style={{ flex: 1, paddingRight: 8 }}>
                  <div style={{ fontSize: 14, fontWeight: 500 }}>{item.name}</div>
                  {item.note && <div style={{ fontSize: 11, color: "#4A6580", marginTop: 1 }}>{item.note}</div>}
                  <div style={{ display: "flex", gap: 4, marginTop: 2, flexWrap: "wrap" }}>{(item.tags||[]).map(t => <DietTag key={t} tag={t} />)}</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                  <span style={{ fontSize: 13, color: "#C9A84C", fontWeight: 600 }}>${item.price}</span>
                  <span style={{ fontSize: 20, color: "#2E8B6A", fontWeight: 700, lineHeight: 1 }}>+</span>
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── PHOTO SCANNER ────────────────────────────────────────────────────────────
function PhotoScanner({ onExtracted, onSkip }) {
  const [status, setStatus] = useState("idle");
  const [preview, setPreview] = useState(null);
  const [logs, setLogs] = useState([]);

  const log = (msg) => setLogs(l => [...l, `${new Date().toLocaleTimeString()}: ${msg}`]);

  const handleFile = async (file) => {
    log(`handleFile called — file: ${file ? file.name + " " + file.type + " " + file.size + "b" : "null"}`);
    if (!file) { log("No file, returning"); return; }

    // Resize image before sending — shrink to max 1000px, quality 0.7
    const resizeImage = (file) => new Promise((resolve) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const MAX = 1000;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(canvas.toDataURL("image/jpeg", 0.7));
      };
      img.src = url;
    });

    const reader = new FileReader();
    reader.onload = async (e) => {
      log(`FileReader loaded — original size: ${file.size} bytes, resizing...`);
      setPreview(e.target.result);
      setStatus("loading");

      // Resize before sending to API
      const resized = await resizeImage(file);
      const base64 = resized.split(",")[1];
      const mediaType = "image/jpeg";
      log(`Resized — new base64 length: ${base64.length}`);
      try {
        log("Calling Anthropic API...");
        const resp = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 2048, messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
            { type: "text", text: `You are reading a Beverly Hills hotel In-Room Dining (IRD) ticket. Extract the fields below and respond ONLY with valid JSON — no markdown, no explanation, no extra text.

TICKET FORMAT RULES:
- Guest last name: handwritten in pen at the very TOP of the ticket, above the printed "BEV In Room Dining" text. A surname like "Sevy", "Jun", "Violt", "Lacy", "Mo", "Maldonado", "Tomascak", "Polansky". May be absent — use empty string. Do NOT confuse with the order taker name printed further down.
- Order taker: printed on the line with the long employee number. e.g. "10398493 Kailah" → "Kailah", "10211053 Choe-Rue T." → "Choe-Rue T.", "10424165 Adrienne P." → "Adrienne P."
- Room number: from TBL field, digits before the slash only. "TBL 820/1" → "820", "TBL 1403/1" → "1403".
- Guest count: from GST field. "GST 2" → "2".
- Delivery time: Look in Delivery Charge block AND ==FULL SERVICE== block for SPECIAL PREP times. Formats: "855 PM"→"20:55", "1010 PM"→"22:10", "6 PM"→"18:00", "955 PM"→"21:55", "DELIVER BY 1035PM"→"22:35", "930 PM"→"21:30", "935 OR ASAP"→"21:35". Also check "REQ:2026-06-16 20:26:55" at bottom → extract time. Return HH:MM 24h or empty string.
- Order time: bottom timestamp e.g. "6/16/2026 10:02 PM" → "22:02". Return HH:MM 24h or empty string.
- Items: List every food/beverage ordered. The leading digit on every item line IS the quantity. When quantity > 1, always prefix with "Nx" e.g. "2 Hot Tea" → "2x Hot Tea", "2 Chicken Noodle Soup" → "2x Chicken Noodle Soup", "1 3 BW Cookies" → "3x BW Cookies". Never drop the quantity. All indented lines below an item (no leading digit) are MODIFIERS of that item — combine them all into one string with — separator. Keep all modifiers attached: e.g. "Beef Tenderloin — medium, olive oil dressing, buttered cauliflower rice". A new item only starts when you see a new leading digit. "G1"/"Gl" = glass of wine e.g. "G1 Paul Hobbs Pinot Noir" → "Glass of Paul Hobbs Pinot Noir". "Open Food" with description below → "Open Food — [description]". "Decaf Cup" is coffee.
- STRICTLY SKIP — never list as items ever: "Delivery Charge", "==FULL SERVICE==", any "Wine Glass" line, "splenda". "Enhancement" header is skipped but its content is appended as modifier to the item above it.
- specialNotes: Global order notes only: delivery time instructions, allergies/dietary flags (e.g. "GLUTEN FREE"), handwritten annotations (e.g. "No water"), table setup from Delivery Charge block (e.g. "2 GLASSES ICE", "2 GLASSES ICE WATER", "BREAD BASKET", "PITCHER ICE WATER") — capture ALL of these even if multiple SPECIAL PREP lines in the Delivery Charge block, comp notes (e.g. "COMP PER ABRIL"). Do NOT put item modifiers here.

Return ONLY this JSON, nothing else before or after:
{"guestName":"","orderTaker":"","roomNumber":"","guestCount":"","deliveryTime":"","orderTime":"","items":[],"specialNotes":""}` }
          ]}] })
        });
        log(`API response status: ${resp.status}`);
        const data = await resp.json();
        log(`API response content blocks: ${data.content?.length}`);
        const text = data.content.map(b => b.text||"").join("");
        const clean = text.replace(/```json|```/g,"").trim();
        log(`Parsed text (first 80): ${clean.slice(0,80)}`);
        onExtracted(JSON.parse(clean));
        setStatus("done");
      } catch(err) {
        log(`ERROR: ${err.message}`);
        setStatus("error");
      }
    };
    reader.onerror = (e) => log(`FileReader error: ${e}`);
    reader.readAsDataURL(file);
  };

  // Debug log panel
  const LogPanel = () => logs.length > 0 ? (
    <div style={{ background: "#050D1A", border: "1px solid #1E3352", borderRadius: 8, padding: 10, marginTop: 12, maxHeight: 160, overflowY: "auto" }}>
      <div style={{ fontSize: 10, color: "#C9A84C", fontWeight: 700, marginBottom: 4, textTransform: "uppercase" }}>🐛 Debug Log</div>
      {logs.map((l, i) => <div key={i} style={{ fontSize: 11, color: "#7A9BBF", fontFamily: "monospace", padding: "1px 0", borderBottom: "1px solid #1E335222" }}>{l}</div>)}
    </div>
  ) : null;

  // File picker: input overlays the button at full size with opacity 0
  const filePickerBtn = (variant, label, inputProps) => (
    <div style={{ position: "relative", marginTop: 8 }}
      onClick={() => log(`Div wrapper tapped — label: ${label}`)}>
      <span style={{ ...S.btnB(variant), display: "block", textAlign: "center", boxSizing: "border-box" }}>{label}</span>
      <input {...inputProps} type="file" accept="image/*"
        style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", opacity: 0, cursor: "pointer", margin: 0, padding: 0, fontSize: 0, zIndex: 10 }}
        onClick={() => log(`Input clicked — label: ${label}`)}
        onChange={e => {
          log(`onChange fired — files: ${e.target.files?.length}`);
          if (e.target.files && e.target.files[0]) handleFile(e.target.files[0]);
        }} />
    </div>
  );

  return <div>
    <h2 style={{ margin: "0 0 8px", fontSize: 20 }}>📷 Scan Order Ticket</h2>
    <p style={{ fontSize: 13, color: "#7A9BBF", marginBottom: 16 }}>Take a photo of the ticket — AI will fill in the order automatically.</p>

    {status === "idle" && <>
      {filePickerBtn("pri", "📷 Take Photo", { capture: "environment" })}
      {filePickerBtn("sec", "🖼 Choose from Library", {})}
      <button style={S.btnB("ghost")} onClick={() => { log("Skip tapped"); onSkip(); }}>Skip — Enter Manually</button>
      <LogPanel />
    </>}

    {status === "loading" && <div style={{ textAlign: "center", padding: "30px 0" }}>
      {preview && <img src={preview} alt="ticket" style={{ width: "100%", borderRadius: 10, marginBottom: 16, opacity: 0.6 }} />}
      <div style={{ fontSize: 32, marginBottom: 8 }}>🔍</div>
      <div style={{ color: "#C9A84C", fontWeight: 600 }}>Reading ticket…</div>
      <div style={{ fontSize: 12, color: "#4A6580", marginTop: 4 }}>AI is extracting order details</div>
      <LogPanel />
    </div>}

    {status === "error" && <div style={{ textAlign: "center", padding: "20px 0" }}>
      <div style={{ fontSize: 32, marginBottom: 8 }}>⚠️</div>
      <div style={{ color: "#D94F3D", fontWeight: 600, marginBottom: 4 }}>Couldn't read ticket</div>
      <div style={{ fontSize: 12, color: "#7A9BBF", marginBottom: 12 }}>Try better lighting or a closer shot.</div>
      {filePickerBtn("pri", "📷 Try Again — Camera", { capture: "environment" })}
      {filePickerBtn("sec", "🖼 Try Again — Library", {})}
      <button style={S.btnB("ghost")} onClick={onSkip}>Enter Manually</button>
      <LogPanel />
    </div>}
  </div>;
}

// ─── NEW ORDER FLOW ───────────────────────────────────────────────────────────
const STEPS = ["Photo","Details","Items","Checklist","Delivery","Done"];

function NewOrder({ onSave, onCancel }) {
  const [step, setStep] = useState(0);
  const [roomNumber, setRoomNumber] = useState("");
  const [guestName, setGuestName] = useState("");
  const [orderTaker, setOrderTaker] = useState("");
  const [guestCount, setGuestCount] = useState("");
  const [dueTime, setDueTime] = useState("");
  const [orderTime, setOrderTime] = useState(timeNow());
  const [items, setItems] = useState([]);
  const [checked, setChecked] = useState([]);
  const [fireOn, setFireOn] = useState(false);
  const [interactions, setInteractions] = useState([]);
  const [specialNotes, setSpecialNotes] = useState("");
  const [manualItem, setManualItem] = useState("");

  const applyExtracted = (p) => {
    if (p.guestName) setGuestName(p.guestName);
    if (p.orderTaker) setOrderTaker(p.orderTaker);
    if (p.roomNumber) setRoomNumber(p.roomNumber);
    if (p.guestCount) setGuestCount(String(p.guestCount));
    if (p.deliveryTime) setDueTime(p.deliveryTime);
    if (p.orderTime) setOrderTime(p.orderTime);
    if (p.specialNotes) setSpecialNotes(p.specialNotes);
    if (p.items?.length > 0) { setItems(p.items); setChecked(p.items.map(()=>false)); }
    setStep(1);
  };

  const addItem = (label) => { setItems(p=>[...p,label]); setChecked(p=>[...p,false]); };
  const removeItem = (i) => { setItems(p=>p.filter((_,j)=>j!==i)); setChecked(p=>p.filter((_,j)=>j!==i)); };
  const toggleCheck = (i) => setChecked(p=>p.map((v,j)=>j===i?!v:v));
  const addInteraction = (note) => setInteractions(p=>[...p,{note,time:timeNow()}]);
  const allChecked = items.length > 0 && checked.every(Boolean);

  const finish = () => onSave({ id: uid(), roomNumber, guestName, orderTaker, guestCount, dueTime, orderTime, items, delivered: true, interactions, specialNotes, createdAt: new Date().toISOString(), deliveredAt: new Date().toISOString() });

  const AllergyBanner = () => specialNotes ? <div style={S.cardWarn}><div style={{ fontSize: 11, color: "#C9A84C", fontWeight: 700 }}>⚠️ SPECIAL PREP / ALLERGY</div><div style={{ fontSize: 13 }}>{specialNotes}</div></div> : null;

  return <div style={S.sec}>
    <div style={{ display: "flex", gap: 3, marginBottom: 12 }}>
      {STEPS.map((s,i) => <div key={s} style={{ flex: 1, height: 3, borderRadius: 2, background: i<=step?"#C9A84C":"#1E3352" }} />)}
    </div>
    <div style={{ fontSize: 11, color: "#7A9BBF", marginBottom: 14, textTransform: "uppercase", letterSpacing: "0.06em" }}>
      Step {step+1}/{STEPS.length} — {STEPS[step]}
    </div>

    {step===0 && <PhotoScanner onExtracted={applyExtracted} onSkip={()=>setStep(1)} />}

    {step===1 && <div>
      <h2 style={{ margin:"0 0 14px", fontSize:20 }}>🛎 Order Details</h2>
      <div style={{ display:"flex", gap:8, marginBottom:10 }}>
        <div style={{ flex:1 }}>
          <label style={S.lbl}>Room Number *</label>
          <input style={{ ...S.inp, fontSize:22, fontWeight:700 }} placeholder="619" value={roomNumber} onChange={e=>setRoomNumber(e.target.value)} inputMode="numeric" />
        </div>
        <div style={{ width:70 }}>
          <label style={S.lbl}>Guests</label>
          <input style={{ ...S.inp, fontSize:18, textAlign:"center" }} placeholder="2" value={guestCount} onChange={e=>setGuestCount(e.target.value)} inputMode="numeric" />
        </div>
      </div>
      <label style={S.lbl}>Guest Last Name</label>
      <input style={{ ...S.inp, marginBottom:10 }} placeholder="e.g. Aileen" value={guestName} onChange={e=>setGuestName(e.target.value)} />
      <label style={S.lbl}>Order Taken By</label>
      <input style={{ ...S.inp, marginBottom:10 }} placeholder="e.g. Kailah" value={orderTaker} onChange={e=>setOrderTaker(e.target.value)} />
      <div style={{ display:"flex", gap:8, marginBottom:10 }}>
        <div style={{ flex:1 }}><label style={S.lbl}>Order Time</label><input style={S.inp} type="time" value={orderTime} onChange={e=>setOrderTime(e.target.value)} /></div>
        <div style={{ flex:1 }}><label style={S.lbl}>Deliver By</label><input style={S.inp} type="time" value={dueTime} onChange={e=>setDueTime(e.target.value)} /></div>
      </div>
      <label style={S.lbl}>Special Notes / Allergies</label>
      <input style={{ ...S.inp, marginBottom:8 }} placeholder="e.g. Peanuts/Almonds allergy" value={specialNotes} onChange={e=>setSpecialNotes(e.target.value)} />
      <AllergyBanner />
      <button style={S.btnB()} onClick={()=>roomNumber.trim()&&setStep(2)} disabled={!roomNumber.trim()}>Next: Add Items →</button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(0)}>← Retake Photo</button>
      <button style={S.btnB("ghost")} onClick={onCancel}>Cancel</button>
    </div>}

    {step===2 && <div>
      <h2 style={{ margin:"0 0 4px", fontSize:20 }}>🍽 Order Items</h2>
      <p style={{ color:"#7A9BBF", fontSize:13, marginBottom:10 }}>Tap any item to add it to the order.</p>
      <AllergyBanner />
      {items.length > 0 && <div style={{ ...S.card, marginBottom:10 }}>
        <div style={{ fontSize:11, color:"#7A9BBF", fontWeight:700, marginBottom:6 }}>ORDER ({items.length} item{items.length>1?"s":""})</div>
        {items.map((item,i) => <div key={i} style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid #1E335244", gap:8 }}>
          <span style={{ fontSize:13, flex:1 }}>• {item}</span>
          <button style={{ background:"none", border:"none", color:"#D94F3D", cursor:"pointer", fontSize:15, flexShrink:0 }} onClick={()=>removeItem(i)}>✕</button>
        </div>)}
      </div>}
      <MenuPicker onAdd={addItem} />
      <div style={S.div} />
      <label style={S.lbl}>Or type manually</label>
      <div style={{ display:"flex", gap:8 }}>
        <input style={{ ...S.inp, flex:1, fontSize:13 }} placeholder="Custom item…" value={manualItem} onChange={e=>setManualItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(setItems(p=>[...p,manualItem.trim()]),setChecked(p=>[...p,false]),setManualItem(""))} />
        <button style={S.btn("sec")} onClick={()=>{ if(manualItem.trim()){ addItem(manualItem.trim()); setManualItem(""); }}}>Add</button>
      </div>
      <button style={S.btnB()} onClick={()=>items.length>0&&setStep(3)} disabled={items.length===0}>Next: Checklist →</button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(1)}>← Back</button>
    </div>}

    {step===3 && <div>
      <h2 style={{ margin:"0 0 4px", fontSize:20 }}>🧾 Table Checklist</h2>
      <p style={{ color:"#7A9BBF", fontSize:13, marginBottom:10 }}>Confirm every item is on the table.</p>
      <AllergyBanner />
      <Checklist items={items} checked={checked} onToggle={toggleCheck} />
      {!allChecked && <div style={{ color:"#D94F3D", fontSize:12, marginTop:8 }}>⚠️ Check off all items before proceeding.</div>}
      <div style={S.div} />
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"#0A1320", borderRadius:10, padding:"12px 14px", marginBottom:8 }}>
        <div><div style={{ fontWeight:700, fontSize:15 }}>🔥 Fire Status</div><div style={{ fontSize:12, color:"#7A9BBF" }}>Must be OFF before delivery</div></div>
        <div style={{ textAlign:"center", cursor:"pointer" }} onClick={()=>setFireOn(f=>!f)}>
          <span style={S.fire(fireOn)}>🔥</span>
          <div style={{ fontSize:11, fontWeight:700, color:fireOn?"#D94F3D":"#2E8B6A" }}>{fireOn?"ON":"OFF"}</div>
        </div>
      </div>
      {fireOn && <div style={{ color:"#D94F3D", fontSize:12, background:"#1F0E0C", borderRadius:8, padding:"8px 12px", marginBottom:8 }}>🔥 Turn off fire before ringing the guest!</div>}
      <button style={S.btnB(allChecked&&!fireOn?"ok":"sec")} onClick={()=>allChecked&&!fireOn&&setStep(4)} disabled={!allChecked||fireOn}>
        {!allChecked?"Check all items first":fireOn?"Turn off fire first!":"Proceed to Delivery →"}
      </button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(2)}>← Back</button>
    </div>}

    {step===4 && <div>
      <h2 style={{ margin:"0 0 4px", fontSize:20 }}>🚪 At the Door</h2>
      <p style={{ color:"#7A9BBF", fontSize:13, marginBottom:12 }}>Re-check landing order. Log any guest interactions.</p>
      <div style={S.card}>
        <div style={{ fontWeight:700, marginBottom:4 }}>Room {roomNumber}{guestName?` · ${guestName}`:""}  {guestCount?`· ${guestCount} guests`:""}</div>
        {orderTaker && <div style={{ fontSize:12, color:"#7A9BBF", marginBottom:6 }}>Order by: {orderTaker}</div>}
        {specialNotes && <div style={{ fontSize:12, color:"#C9A84C", marginBottom:8 }}>⚠️ {specialNotes}</div>}
        {items.map((item,i) => <div key={i} style={{ fontSize:13, padding:"2px 0" }}>✅ {item}</div>)}
      </div>
      <label style={{ ...S.lbl, marginTop:8 }}>Guest Interactions</label>
      <InteractionLog interactions={interactions} onAdd={addInteraction} />
      <button style={S.btnB("ok")} onClick={()=>setStep(5)}>Mark as Delivered ✓</button>
      <button style={S.btnB("ghost")} onClick={()=>setStep(3)}>← Back</button>
    </div>}

    {step===5 && <div style={{ textAlign:"center", padding:"24px 0" }}>
      <div style={{ fontSize:56, marginBottom:10 }}>✅</div>
      <h2 style={{ margin:"0 0 6px", fontSize:22 }}>Order Delivered!</h2>
      <div style={{ color:"#7A9BBF", marginBottom:4 }}>Room {roomNumber} · {timeNow()}</div>
      {dueTime && <div style={{ color:"#2E8B6A", fontSize:13 }}>Promised by {dueTime}</div>}
      <div style={{ ...S.card, textAlign:"left", marginTop:16 }}>
        {guestName && <div style={{ fontSize:12, color:"#7A9BBF" }}>Guest: {guestName}</div>}
        {orderTaker && <div style={{ fontSize:12, color:"#7A9BBF", marginBottom:6 }}>Taken by: {orderTaker}</div>}
        {items.map((item,i) => <div key={i} style={{ fontSize:13, padding:"2px 0" }}>• {item}</div>)}

}

// ─── ACTIVE ORDER CARD ────────────────────────────────────────────────────────
function ActiveOrderCard({ order, onUpdate }) {
  const [expanded, setExpanded] = useState(false);
  const [interactions, setInteractions] = useState(order.interactions || []);
  const addInteraction = (note) => { const u=[...interactions,{note,time:timeNow()}]; setInteractions(u); onUpdate({...order,interactions:u}); };
  const isLate = order.dueTime && !order.delivered && (() => {
    const [h,m] = order.dueTime.split(":").map(Number);
    const due = new Date(); due.setHours(h,m,0,0);
    return new Date() > due;
  })();
  return (
    <div style={isLate ? S.cardHot : S.card}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", cursor:"pointer" }} onClick={()=>setExpanded(e=>!e)}>
        <div>
          <div style={{ fontWeight:700, fontSize:18 }}>Room {order.roomNumber}{order.guestName?` · ${order.guestName}`:""}</div>
          {order.orderTaker && <div style={{ fontSize:11, color:"#4A6580" }}>by {order.orderTaker}</div>}
          <div style={{ fontSize:12, color:"#7A9BBF", marginTop:2 }}>{order.items.length} items{order.dueTime?` · Due ${order.dueTime}`:""}{order.guestCount?` · ${order.guestCount} guests`:""}</div>
        </div>
        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
          {isLate && <span style={S.tag("#D94F3D")}>LATE</span>}
          {order.specialNotes && <span style={S.tag("#C9A84C")}>⚠️</span>}
          <span style={{ color:"#4A6580" }}>{expanded?"▲":"▼"}</span>
        </div>
      </div>
      {expanded && <div style={{ marginTop:12 }}>
        {order.specialNotes && <div style={S.cardWarn}><div style={{ fontSize:11, color:"#C9A84C", fontWeight:700 }}>⚠️ SPECIAL PREP</div><div style={{ fontSize:13 }}>{order.specialNotes}</div></div>}
        {order.items.map((item,i) => <div key={i} style={{ fontSize:13, padding:"2px 0" }}>• {item}</div>)}
        <div style={S.div} />
        <InteractionLog interactions={interactions} onAdd={addInteraction} />
      </div>}
    </div>
  );
}

function OrdersTab({ data, setData }) {
  const [creating, setCreating] = useState(false);
  const active = data.orders.filter(o => !o.delivered);
  const saveOrder = (order) => { setData(d=>{ const nd={...d,orders:[order,...d.orders]}; saveData(nd); return nd; }); setCreating(false); };
  const updateOrder = (u) => { setData(d=>{ const nd={...d,orders:d.orders.map(o=>o.id===u.id?u:o)}; saveData(nd); return nd; }); };
  if (creating) return <NewOrder onSave={saveOrder} onCancel={()=>setCreating(false)} />;
  return <div style={S.sec}>
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
      <h2 style={{ margin:0, fontSize:20 }}>🛎 Active Orders</h2>
      <button style={S.btn()} onClick={()=>setCreating(true)}>+ New Order</button>
    </div>
    {active.length===0
      ? <div style={S.empty}><div style={{ fontSize:40 }}>🍽</div><div>No active orders</div><div style={{ fontSize:12, marginTop:4 }}>Tap + New Order to start</div></div>
      : active.map(o=><ActiveOrderCard key={o.id} order={o} onUpdate={updateOrder} />)}
  </div>;
}

function AmenitiesTab({ data, setData }) {
  const [adding, setAdding] = useState(false);
  const [roomInput, setRoomInput] = useState("");
  const [itemInput, setItemInput] = useState("");
  const [items, setItems] = useState([]);
  const addItem = () => { if (itemInput.trim()) { setItems(p=>[...p,itemInput.trim()]); setItemInput(""); } };
  const saveAmenity = () => {
    if (!roomInput.trim()||items.length===0) return;
    const a={id:uid(),roomNumber:roomInput,items,delivered:false,dnd:false,interactions:[],createdAt:new Date().toISOString()};
    setData(d=>{ const nd={...d,amenities:[a,...d.amenities]}; saveData(nd); return nd; });
    setRoomInput(""); setItems([]); setAdding(false);
  };
  const updateAmenity = (u) => { setData(d=>{ const nd={...d,amenities:d.amenities.map(a=>a.id===u.id?u:a)}; saveData(nd); return nd; }); };
  const active = data.amenities.filter(a=>!a.delivered&&!a.dnd);
  return <div style={S.sec}>
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
      <h2 style={{ margin:0, fontSize:20 }}>🎁 Amenities</h2>
      <button style={S.btn()} onClick={()=>setAdding(a=>!a)}>{adding?"Cancel":"+ New"}</button>
    </div>
    {adding && <div style={{ ...S.card, marginBottom:16 }}>
      <label style={S.lbl}>Room Number</label>
      <input style={{ ...S.inp, marginBottom:10, fontSize:20, fontWeight:700 }} placeholder="508" value={roomInput} onChange={e=>setRoomInput(e.target.value)} inputMode="numeric" />
      <label style={S.lbl}>Add Items</label>
      <div style={{ display:"flex", gap:8, marginBottom:8 }}>
        <input style={{ ...S.inp, flex:1 }} placeholder="e.g. Champagne, Strawberries" value={itemInput} onChange={e=>setItemInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} />
        <button style={S.btn()} onClick={addItem}>Add</button>
      </div>
      {items.map((item,i) => <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", fontSize:13 }}>
        <span>• {item}</span>
        <button style={{ background:"none", border:"none", color:"#D94F3D", cursor:"pointer" }} onClick={()=>setItems(p=>p.filter((_,j)=>j!==i))}>✕</button>
      </div>)}
      <button style={S.btnB("ok")} onClick={saveAmenity} disabled={!roomInput.trim()||items.length===0}>Save Amenity Run</button>
    </div>}
    {active.length===0&&!adding
      ? <div style={S.empty}><div style={{ fontSize:40 }}>🎁</div><div>No active amenities</div></div>
      : active.map(a=><AmenityCard key={a.id} amenity={a} onUpdate={updateAmenity} />)}
  </div>;
}

// ─── MENU LOOKUP TAB ─────────────────────────────────────────────────────────
// Flat list of every item across all menus for instant search
const ALL_ITEMS = Object.entries(MENUS).flatMap(([menuName, categories]) =>
  categories.flatMap(cat =>
    cat.items.map(item => ({ ...item, menuName, category: cat.category }))
  )
);

function MenuTab() {
  const [search, setSearch] = useState("");
  const [activeMenu, setActiveMenu] = useState("All");
  const [activeCat, setActiveCat] = useState(null);
  const [expanded, setExpanded] = useState(null);

  const menuNames = ["All", ...Object.keys(MENUS)];
  const query = search.toLowerCase().trim();

  // Filter by menu first
  const byMenu = activeMenu === "All" ? ALL_ITEMS : ALL_ITEMS.filter(i => i.menuName === activeMenu);

  // Then by category pill (only when no search active)
  const categories = [...new Set(byMenu.map(i => i.category))];

  // Then apply search or category filter
  const results = query
    ? byMenu.filter(i =>
        i.name.toLowerCase().includes(query) ||
        (i.note || "").toLowerCase().includes(query) ||
        i.category.toLowerCase().includes(query) ||
        (i.tags || []).some(t => t.toLowerCase().includes(query))
      )
    : activeCat
      ? byMenu.filter(i => i.category === activeCat)
      : byMenu;

  const toggleExpand = (key) => setExpanded(e => e === key ? null : key);

  return (
    <div style={S.sec}>
      <h2 style={{ margin: "0 0 14px", fontSize: 20 }}>🔎 Menu Lookup</h2>

      {/* Search bar */}
      <div style={{ position: "relative", marginBottom: 10 }}>
        <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 15 }}>🔍</span>
        <input
          style={{ ...S.inp, paddingLeft: 36, fontSize: 15 }}
          placeholder="Search any item, ingredient, tag…"
          value={search}
          onChange={e => { setSearch(e.target.value); setActiveCat(null); }}
          autoFocus={false}
        />
        {search && (
          <button onClick={() => setSearch("")} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#7A9BBF", cursor: "pointer", fontSize: 18 }}>✕</button>
        )}
      </div>

      {/* Menu type pills */}
      <div style={{ display: "flex", gap: 5, overflowX: "auto", paddingBottom: 6, marginBottom: 6 }}>
        {menuNames.map(m => (
          <button key={m} onClick={() => { setActiveMenu(m); setActiveCat(null); setSearch(""); }}
            style={{ padding: "5px 11px", borderRadius: 20, border: `1px solid ${activeMenu === m ? "#C9A84C" : "#1E3352"}`, background: activeMenu === m ? "#C9A84C22" : "#0F1B2D", color: activeMenu === m ? "#C9A84C" : "#7A9BBF", cursor: "pointer", fontSize: 12, whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 4 }}>
            {MENU_ICONS[m] && <span>{MENU_ICONS[m]}</span>}<span>{m}</span>
          </button>
        ))}
      </div>

      {/* Category pills — only show when no search active */}
      {!search && (
        <div style={{ display: "flex", gap: 5, overflowX: "auto", paddingBottom: 6, marginBottom: 8 }}>
          <button onClick={() => setActiveCat(null)} style={{ padding: "4px 10px", borderRadius: 20, border: `1px solid ${!activeCat ? "#C9A84C" : "#1E3352"}`, background: !activeCat ? "#C9A84C22" : "#0F1B2D", color: !activeCat ? "#C9A84C" : "#4A6580", cursor: "pointer", fontSize: 11, whiteSpace: "nowrap" }}>All</button>
          {categories.map(cat => (
            <button key={cat} onClick={() => setActiveCat(cat === activeCat ? null : cat)}
              style={{ padding: "4px 10px", borderRadius: 20, border: `1px solid ${activeCat === cat ? "#C9A84C" : "#1E3352"}`, background: activeCat === cat ? "#C9A84C22" : "#0F1B2D", color: activeCat === cat ? "#C9A84C" : "#4A6580", cursor: "pointer", fontSize: 11, whiteSpace: "nowrap" }}>
              {cat}
            </button>
          ))}
        </div>
      )}

      {/* Result count */}
      <div style={{ fontSize: 11, color: "#4A6580", marginBottom: 10 }}>
        {query ? `${results.length} result${results.length !== 1 ? "s" : ""} for "${query}"` : `${results.length} items`}
      </div>

      {/* Results */}
      {results.length === 0 && (
        <div style={S.empty}>
          <div style={{ fontSize: 36 }}>🍽</div>
          <div>No items found</div>
          <div style={{ fontSize: 12, marginTop: 4 }}>Try a different search</div>
        </div>
      )}

      <div>
        {results.map((item, idx) => {
          const key = `${item.menuName}-${item.name}-${idx}`;
          const isOpen = expanded === key;
          return (
            <div key={key} style={{ ...S.card, padding: 0, overflow: "hidden", marginBottom: 8 }}>
              {/* Item row */}
              <div onClick={() => toggleExpand(key)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", cursor: "pointer" }}>
                <div style={{ flex: 1, paddingRight: 10 }}>
                  <div style={{ fontWeight: 600, fontSize: 15 }}>{item.name}</div>
                  <div style={{ display: "flex", gap: 5, marginTop: 3, flexWrap: "wrap", alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: "#4A6580" }}>{MENU_ICONS[item.menuName]} {item.menuName}</span>
                    <span style={{ fontSize: 11, color: "#1E3352" }}>·</span>
                    <span style={{ fontSize: 11, color: "#4A6580" }}>{item.category}</span>
                    {(item.tags || []).map(t => <DietTag key={t} tag={t} />)}
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                  <span style={{ fontSize: 16, fontWeight: 700, color: "#C9A84C" }}>${item.price}</span>
                  <span style={{ fontSize: 14, color: "#4A6580" }}>{isOpen ? "▲" : "▼"}</span>
                </div>
              </div>

              {/* Expanded detail */}
              {isOpen && (
                <div style={{ borderTop: "1px solid #1E3352", padding: "12px 14px", background: "#0F1B2D" }}>
                  {item.note && (
                    <div style={{ marginBottom: 10 }}>
                      <div style={{ fontSize: 11, color: "#7A9BBF", fontWeight: 700, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.05em" }}>Description</div>
                      <div style={{ fontSize: 13, color: "#F7F4EF", lineHeight: 1.5 }}>{item.note}</div>
                    </div>
                  )}
                  {item.options && item.options.length > 0 && (
                    <div>
                      <div style={{ fontSize: 11, color: "#7A9BBF", fontWeight: 700, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>Options</div>
                      {item.options.map(opt => (
                        <div key={opt.label} style={{ marginBottom: 6 }}>
                          <span style={{ fontSize: 12, color: "#C9A84C", fontWeight: 600 }}>{opt.label}: </span>
                          <span style={{ fontSize: 12, color: "#7A9BBF" }}>{opt.choices.join(", ")}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #1E335244", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontSize: 12, color: "#4A6580" }}>
                      +17% service · +3.5% admin · +$7 delivery
                    </div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: "#C9A84C" }}>${item.price}</div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

      const swCode = "// Room Service SW \u2014 Network First, Cache Fallback\n// Always tries network first so updates are instant.\n// Falls back to cache only when truly offline.\n// Never forces cache-clear or blocks the user.\n\nconst CACHE = \"room-service-v1\";\n\n// Files to pre-cache on install (shell only \u2014 not API calls)\nconst PRECACHE = [\n  \"./\",\n  \"./index.html\",\n  \"./manifest.json\",\n  \"./icon-192.png\",\n  \"./icon-512.png\",\n];\n\n// \u2500\u2500 Install: pre-cache the app shell \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nself.addEventListener(\"install\", (event) => {\n  // Skip waiting so new SW activates immediately without requiring tab close\n  self.skipWaiting();\n  event.waitUntil(\n    caches.open(CACHE).then((cache) => cache.addAll(PRECACHE))\n  );\n});\n\n// \u2500\u2500 Activate: clean up old caches, claim all clients immediately \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nself.addEventListener(\"activate\", (event) => {\n  event.waitUntil(\n    Promise.all([\n      // Take control of all open tabs right away\n      self.clients.claim(),\n      // Delete any old cache versions\n      caches.keys().then((keys) =>\n        Promise.all(\n          keys\n            .filter((key) => key !== CACHE)\n            .map((key) => caches.delete(key))\n        )\n      ),\n    ])\n  );\n});\n\n// \u2500\u2500 Fetch: Network First, Cache Fallback \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nself.addEventListener(\"fetch\", (event) => {\n  const { request } = event;\n\n  // Never intercept cross-origin requests (Anthropic API, etc.)\n  if (!request.url.startsWith(self.location.origin)) return;\n\n  // Never intercept non-GET requests\n  if (request.method !== \"GET\") return;\n\n  event.respondWith(networkFirst(request));\n});\n\nasync function networkFirst(request) {\n  try {\n    // Always try network first\n    const networkResponse = await fetch(request);\n\n    // If successful, update the cache in the background\n    if (networkResponse.ok) {\n      const cache = await caches.open(CACHE);\n      cache.put(request, networkResponse.clone()); // async, non-blocking\n    }\n\n    return networkResponse;\n  } catch {\n    // Network failed \u2014 serve from cache if available\n    const cached = await caches.match(request);\n    if (cached) return cached;\n\n    // Ultimate fallback: return cached index.html for navigation requests\n    // so the SPA still loads offline\n    if (request.mode === \"navigate\") {\n      const fallback = await caches.match(\"./index.html\");\n      if (fallback) return fallback;\n    }\n\n    // Nothing we can do\n    return new Response(\"Offline \u2014 no cached version available\", {\n      status: 503,\n      statusText: \"Service Unavailable\",\n    });\n  }\n}\n";

          .catch(e => console.warn("SW err:", e));
      });
    }
