// ─── SETTINGS TAB ─────────────────────────────────────────────────────────────
function SettingsTab({ data, setData }) {
  const [installPrompt, setInstallPrompt] = useState(null);
  const [installed, setInstalled] = useState(false);
  const [platform, setPlatform] = useState("unknown");
  const [showClearConfirm, setShowClearConfirm] = useState(false);
  const [cleared, setCleared] = useState(false);
  const [updateAvailable, setUpdateAvailable] = useState(false);
  const [iosSeparateStorage, setIosSeparateStorage] = useState(false);
  const [storageAge, setStorageAge] = useState(null);
  const [iosVersion, setIosVersion] = useState(null);
  const [online, setOnline] = useState(navigator.onLine);

  useEffect(() => {
    const ua = navigator.userAgent.toLowerCase();
    const isIos = /iphone|ipad|ipod/.test(ua);
    const isAndroid = /android/.test(ua);
    const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
    setPlatform(isIos ? "ios" : isAndroid ? "android" : "desktop");
    if (isStandalone) setInstalled(true);

    // ── FIX #2: Detect iOS separate storage ─────────────────────────────────
    if (isIos) {
      // Detect iOS version
      const match = ua.match(/os (\d+)_(\d+)/);
      if (match) {
        const major = parseInt(match[1]);
        setIosVersion(major);
        // iOS PWA uses separate storage from Safari browser
        // Warn if they're in browser (not standalone) with existing data
        if (!isStandalone && (data.orders.length > 0 || data.amenities.length > 0)) {
          setIosSeparateStorage(true);
        }
      }
    }

    // ── FIX #3: Check storage age ────────────────────────────────────────────
    try {
      const saved = localStorage.getItem("rs_last_active");
      if (saved) {
        const days = Math.floor((Date.now() - parseInt(saved)) / (1000 * 60 * 60 * 24));
        setStorageAge(days);
      }
      // Update last active timestamp
      localStorage.setItem("rs_last_active", Date.now().toString());
    } catch {}

    // ── FIX #4: Camera permission ─────────────────────────────────────────────
    // Handled by file input approach — no additional code needed

    // ── FIX #5: SW update check ───────────────────────────────────────────────
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.ready.then(reg => {
        reg.update().then(() => {
          if (reg.waiting) setUpdateAvailable(true);
        });
        // Listen for new SW waiting
        reg.addEventListener("updatefound", () => {
          const newWorker = reg.installing;
          if (newWorker) {
            newWorker.addEventListener("statechange", () => {
              if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                setUpdateAvailable(true);
              }
            });
          }
        });
      }).catch(() => {});
    }

    // Online/offline listener
    const onOnline = () => setOnline(true);
    const onOffline = () => setOnline(false);
    window.addEventListener("online", onOnline);
    window.addEventListener("offline", onOffline);

    // Android install prompt
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      setInstallPrompt(e);
    });
    window.addEventListener("appinstalled", () => setInstalled(true));

    // Cleanup: remove listeners when SettingsTab unmounts (e.g. switching tabs)
    // Prevents duplicate listeners piling up every time Settings is revisited
    return () => {
      window.removeEventListener("online", onOnline);
      window.removeEventListener("offline", onOffline);
    };
  }, []);

  const triggerInstall = async () => {
    if (installPrompt) {
      installPrompt.prompt();
      const result = await installPrompt.userChoice;
      if (result.outcome === "accepted") setInstalled(true);
    }
  };

  const applyUpdate = () => {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.ready.then(reg => {
        if (reg.waiting) {
          reg.waiting.postMessage({ type: "SKIP_WAITING" });
          window.location.reload();
        } else {
          window.location.reload();
        }
      });
    } else {
      window.location.reload();
    }
  };

  // Manual force-update: unregister SW, clear all caches, hard reload
  // No need to clear browser cookies/cache manually — this does it for the app only
  const [forceChecking, setForceChecking] = useState(false);
  const forceUpdate = async () => {
    setForceChecking(true);
    try {
      // Delete all caches this app created
      if ("caches" in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      // Unregister the service worker so a fresh one installs
      if ("serviceWorker" in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
    } catch (e) {
      console.warn("Force update cleanup error:", e);
    }
    // Hard reload bypassing cache, with a cache-busting query param
    window.location.href = window.location.pathname + "?_t=" + Date.now();
  };

  const clearData = () => {
    setData(defaultState());
    saveData(defaultState());
    setCleared(true);
    setShowClearConfirm(false);
  };

  const orderCount = data.orders.length;
  const amenityCount = data.amenities.length;
  const isIos = platform === "ios";
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;

  return (
    <div style={S.sec}>
      <h2 style={{ margin: "0 0 16px", fontSize: 21, fontWeight: 700, letterSpacing: "-0.01em" }}>⚙️ Settings</h2>

      {/* ── FIX #5: Update Available Banner ────────────────────────────────── */}
      {updateAvailable && (
        <div style={{ background: "#0E1F19", border: "1px solid #4F9C7E", borderRadius: 12, padding: 14, marginBottom: 12, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
          <div>
            <div style={{ fontWeight: 700, color: "#4F9C7E", fontSize: 14 }}>🆕 Update Available</div>
            <div style={{ fontSize: 12, color: "#7C8BA3" }}>New version ready — tap to apply</div>
          </div>
          <button style={{ ...S.btn("ok"), padding: "8px 14px", fontSize: 13 }} onClick={applyUpdate}>Update Now</button>
        </div>
      )}

      {/* ── FIX #1: API Error helper (shown in offline/blocked state) ───────── */}
      {!online && (
        <div style={{ background: "#241310", border: "1px solid #5A2620", borderRadius: 12, padding: 14, marginBottom: 12 }}>
          <div style={{ fontWeight: 700, color: "#B8473A", fontSize: 14, marginBottom: 4 }}>📵 You're Offline</div>
          <div style={{ fontSize: 12, color: "#7C8BA3" }}>Photo scanning requires internet. Menu browsing and manual entry still work.</div>
        </div>
      )}

      {/* ── FIX #2: iOS Separate Storage Warning ────────────────────────────── */}
      {isIos && !isStandalone && (
        <div style={{ background: "#241D0C", border: "1px solid #4A3A12", borderRadius: 12, padding: 14, marginBottom: 12 }}>
          <div style={{ fontWeight: 700, color: "#C9A24B", fontSize: 14, marginBottom: 4 }}>⚠️ iPhone: Install for Persistent Data</div>
          <div style={{ fontSize: 12, color: "#7C8BA3", marginBottom: 8 }}>
            Safari and the installed app use <strong style={{ color: "#E8E4DA" }}>separate storage</strong>. Orders saved in Safari won't appear in the installed app and vice versa. Install the app and always use it from your home screen.
          </div>
          <div style={{ fontSize: 11, color: "#52617A" }}>
            Tap Share → Add to Home Screen → always open from there
          </div>
        </div>
      )}

      {/* ── FIX #3: Storage Age Warning ─────────────────────────────────────── */}
      {storageAge !== null && storageAge >= 5 && (
        <div style={{ background: storageAge >= 7 ? "#241310" : "#241D0C", border: `1px solid ${storageAge >= 7 ? "#5A2620" : "#4A3A12"}`, borderRadius: 12, padding: 14, marginBottom: 12 }}>
          <div style={{ fontWeight: 700, color: storageAge >= 7 ? "#B8473A" : "#C9A24B", fontSize: 14, marginBottom: 4 }}>
            {storageAge >= 7 ? "🚨 Data May Be Lost" : "⚠️ Data Expiry Warning"}
          </div>
          <div style={{ fontSize: 12, color: "#7C8BA3" }}>
            {storageAge >= 7
              ? `Safari hasn't been active for ${storageAge} days. iOS may have already cleared your stored data.`
              : `Your data hasn't been accessed in ${storageAge} days. Safari clears data after 7 days of inactivity on iPhone.`}
          </div>
          {storageAge >= 7 && <div style={{ fontSize: 11, color: "#B8473A", marginTop: 6 }}>Install as app to avoid this — PWA storage is more persistent.</div>}
        </div>
      )}

      {/* Install as App */}
      <div style={{ ...S.card, marginBottom: 10 }}>
        <div style={{ fontSize: 13, color: "#7C8BA3", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>📲 Install as App</div>
        {installed ? (
          <div style={{ display: "flex", alignItems: "center", gap: 12, background: "#0E1F19", border: "1px solid #4F9C7E", borderRadius: 10, padding: 14 }}>
            <span style={{ fontSize: 32 }}>✅</span>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15, color: "#4F9C7E" }}>App Installed!</div>
              <div style={{ fontSize: 12, color: "#7C8BA3" }}>Running as a home screen app</div>
            </div>
          </div>

// ─── ERROR BOUNDARY (shows exactly what crashed instead of blank screen) ──────
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null, errorInfo: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  componentDidCatch(error, errorInfo) {
    this.setState({ error, errorInfo });
    console.error("App crashed:", error, errorInfo);
  }
  render() {
    if (this.state.error) {
      return (
        <div style={{ background: "#241310", color: "#E8E4DA", minHeight: "100vh", padding: 20, fontFamily: "monospace" }}>
          <h2 style={{ color: "#B8473A", marginBottom: 12 }}>⚠️ App Crashed</h2>
          <div style={{ fontSize: 13, marginBottom: 16, color: "#E8E4DA" }}>{String(this.state.error.message || this.state.error)}</div>
          <div style={{ fontSize: 11, color: "#7C8BA3", whiteSpace: "pre-wrap", maxHeight: 300, overflowY: "auto", background: "#141D2E", padding: 10, borderRadius: 6 }}>
            {this.state.errorInfo ? this.state.errorInfo.componentStack : "No component stack available"}
          </div>
          <button
            style={{ marginTop: 16, padding: "10px 16px", background: "#C9A24B", border: "none", borderRadius: 8, fontWeight: 700, width: "100%" }}
            onClick={() => { localStorage.removeItem("rs_app_data_v4"); window.location.reload(); }}
          >Clear Data & Reload</button>
          <button
            style={{ marginTop: 8, padding: "10px 16px", background: "#23304A", color: "#7C8BA3", border: "none", borderRadius: 8, width: "100%" }}
            onClick={() => window.location.reload()}
          >Just Reload</button>
        </div>
      );
    }
    return this.props.children;
  }
}
